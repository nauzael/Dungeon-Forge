<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente principal del escudo: azul oscuro profundo -->
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B"/>
      <stop offset="50%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#020617"/>
    </linearGradient>

    <!-- Gradiente para efecto 3D del dado -->
    <linearGradient id="d20TopFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#0284C7"/>
    </linearGradient>

    <linearGradient id="d20LeftFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0369A1"/>
      <stop offset="100%" style="stop-color:#075985"/>
    </linearGradient>

    <linearGradient id="d20RightFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="100%" style="stop-color:#0284C7"/>
    </linearGradient>

    <linearGradient id="d20FrontFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7DD3FC"/>
      <stop offset="100%" style="stop-color:#38BDF8"/>
    </linearGradient>

    <!-- Gradiente dorado para bordes -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D"/>
      <stop offset="50%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>

    <!-- Gradiente cyan para acentos magicos -->
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7DD3FC"/>
      <stop offset="100%" style="stop-color:#0EA5E9"/>
    </linearGradient>

    <!-- Gradiente para el dragon -->
    <linearGradient id="dragonGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="50%" style="stop-color:#D97706"/>
      <stop offset="100%" style="stop-color:#B45309"/>
    </linearGradient>

    <!-- Filtro de sombra -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Filtro de resplandor magico -->
    <filter id="magicGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Fondo: Escudo medieval estilizado -->
  <g filter="url(#dropShadow)">
    <!-- Forma principal del escudo -->
    <path d="M256 32 L448 96 L448 256 C448 368 256 480 256 480 C256 480 64 368 64 256 L64 96 Z"
          fill="url(#shieldGradient)"
          stroke="url(#goldGradient)"
          stroke-width="8"/>

    <!-- Borde interior decorativo con glow -->
    <path d="M256 52 L424 108 L424 256 C424 336 256 424 256 424 C256 424 88 336 88 256 L88 108 Z"
          fill="none"
          stroke="url(#cyanGlow)"
          stroke-width="2"
          stroke-opacity="0.4"
          filter="url(#magicGlow)"/>
  </g>

  <!-- Silueta de Dragon en el fondo -->
  <g filter="url(#dropShadow)" opacity="0.6">
    <path d="
      M180 380
      Q160 360 165 340
      Q155 350 150 340
      L155 320
      Q145 330 140 320
      Q135 335 130 325
      L145 300
      Q140 290 150 280
      L140 260
      Q130 255 135 240
      L150 230
      L200 200
      L220 180
      L260 160
      L300 155
      L320 150
      Q330 145 340 140
      L350 135
      Q355 130 360 135
      L370 145
      Q365 150 355 155
      L340 165
      Q335 175 330 185
      L310 200
      L280 210
      L240 220
      L210 240
      L195 260
      L185 280
      Q180 295 185 310
      L200 320
      Q195 335 190 350
      L195 370
      Q200 385 190 400
      Q185 420 200 430
      L220 420
      Q225 400 230 380
      L220 365
      Q215 350 210 340
      Q205 350 200 340
      Q205 360 220 375
      L230 385
      Q235 400 225 410
      L210 405
      Q200 395 195 380
      L180 380
      Z
      M260 155
      Q270 150 280 155
      Q275 160 265 160
      Z
      M295 152
      Q305 148 315 155
      Q305 158 295 156
      Z
      M350 140
      Q360 138 365 145
      Q358 148 350 145
      Z
    " fill="url(#dragonGradient)"/>
  </g>

  <!-- Dado d20 3D sobrepuesto -->
  <g transform="translate(256, 245)" filter="url(#dropShadow)">
    <ellipse cx="15" cy="75" rx="75" ry="22" fill="#000000" fill-opacity="0.4"/>
    <polygon points="0,-75 65,-37 65,0 0,0" fill="url(#d20TopFace)"/>
    <polygon points="0,0 65,0 65,40 0,75" fill="url(#d20FrontFace)"/>
    <polygon points="65,0 130,-37 130,37 65,40" fill="url(#d20RightFace)"/>
    <polygon points="0,75 65,40 65,75 0,0" fill="url(#d20LeftFace)"/>
    <polygon points="0,0 0,75 -65,37 -65,-37" fill="url(#d20LeftFace)"/>
    <polygon points="-65,-37 0,0 -65,37 -130,-37" fill="url(#d20RightFace)"/>
    <polygon points="130,-37 65,0 65,-40 130,-77" fill="url(#d20TopFace)"/>
    <polygon points="0,-77 65,-37 130,-37 130,37 65,75 0,75 -65,37 -130,37 -130,-37 -65,-77"
             fill="none" stroke="url(#goldGradient)" stroke-width="3"/>
    <text x="3" y="14" font-family="Georgia, serif" font-size="56" font-weight="900" fill="#0369A1" text-anchor="middle" dominant-baseline="middle">20</text>
    <text x="0" y="12" font-family="Georgia, serif" font-size="56" font-weight="900" fill="url(#goldGradient)" text-anchor="middle" dominant-baseline="middle" stroke="#020617" stroke-width="1">20</text>
    <circle cx="0" cy="-77" r="7" fill="url(#goldGradient)"/>
    <circle cx="130" cy="-37" r="7" fill="url(#goldGradient)"/>
    <circle cx="130" cy="37" r="7" fill="url(#goldGradient)"/>
    <circle cx="0" cy="75" r="7" fill="url(#goldGradient)"/>
    <circle cx="-130" cy="37" r="7" fill="url(#goldGradient)"/>
    <circle cx="-130" cy="-37" r="7" fill="url(#goldGradient)"/>
  </g>

  <!-- Destellos de luz decorativos -->
  <g filter="url(#magicGlow)">
    <circle cx="175" cy="190" r="4" fill="#7DD3FC" opacity="0.7"/>
    <circle cx="337" cy="190" r="4" fill="#7DD3FC" opacity="0.7"/>
    <circle cx="155" cy="340" r="3" fill="#FCD34D" opacity="0.6"/>
    <circle cx="357" cy="340" r="3" fill="#FCD34D" opacity="0.6"/>
    <circle cx="200" cy="400" r="2" fill="#7DD3FC" opacity="0.5"/>
    <circle cx="312" cy="400" r="2" fill="#7DD3FC" opacity="0.5"/>
  </g>

  <!-- Tachuelas decorativas -->
  <g>
    <circle cx="256" cy="50" r="7" fill="url(#goldGradient)" filter="url(#dropShadow)"/>
    <circle cx="110" cy="108" r="6" fill="url(#goldGradient)"/>
    <circle cx="402" cy="108" r="6" fill="url(#goldGradient)"/>
    <circle cx="75" cy="220" r="5" fill="url(#goldGradient)"/>
    <circle cx="437" cy="220" r="5" fill="url(#goldGradient)"/>
    <circle cx="68" cy="320" r="4" fill="url(#goldGradient)"/>
    <circle cx="444" cy="320" r="4" fill="url(#goldGradient)"/>
  </g>
</svg>