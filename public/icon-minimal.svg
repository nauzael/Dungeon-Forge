<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente azul oscuro para circulo -->
    <radialGradient id="bgGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </radialGradient>

    <!-- Gradiente 3D del dado -->
    <linearGradient id="d20TopFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#0284C7"/>
    </linearGradient>

    <linearGradient id="d20LeftFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0369A1"/>
      <stop offset="100%" style="stop-color:#075985"/>
    </linearGradient>

    <linearGradient id="d20RightFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="100%" style="stop-color:#0284C7"/>
    </linearGradient>

    <linearGradient id="d20FrontFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7DD3FC"/>
      <stop offset="100%" style="stop-color:#38BDF8"/>
    </linearGradient>

    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D"/>
      <stop offset="50%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>

    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Circulo de fondo -->
  <circle cx="256" cy="256" r="230" fill="url(#bgGradient)" stroke="url(#goldGradient)" stroke-width="10" filter="url(#dropShadow)"/>

  <!-- Borde interior con glow -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#0EA5E9" stroke-width="2" stroke-opacity="0.5" filter="url(#glow)"/>

  <!-- Dado d20 3D -->
  <g transform="translate(256, 250)" filter="url(#dropShadow)">
    <!-- Sombra -->
    <ellipse cx="10" cy="65" rx="65" ry="18" fill="#000000" fill-opacity="0.5"/>

    <!-- Caras del hexaedro -->
    <polygon points="0,-65 55,-32 55,0 0,0" fill="url(#d20TopFace)"/>
    <polygon points="0,0 55,0 55,35 0,65" fill="url(#d20FrontFace)"/>
    <polygon points="55,0 115,-32 115,32 55,35" fill="url(#d20RightFace)"/>
    <polygon points="0,65 55,35 55,65 0,0" fill="url(#d20LeftFace)"/>
    <polygon points="0,0 0,65 -55,32 -55,-32" fill="url(#d20LeftFace)"/>
    <polygon points="-55,-32 0,0 -55,32 -115,-32" fill="url(#d20RightFace)"/>
    <polygon points="115,-32 55,0 55,-35 115,-67" fill="url(#d20TopFace)"/>

    <!-- Borde dorado -->
    <polygon points="0,-67 55,-32 115,-32 115,32 55,65 0,65 -55,32 -55,-32 -115,-32 -115,32 -67,0"
             fill="none" stroke="url(#goldGradient)" stroke-width="2.5"/>

    <!-- Numero 20 con efecto -->
    <text x="2" y="12" font-family="Georgia, serif" font-size="48" font-weight="900" fill="#0369A1" text-anchor="middle" dominant-baseline="middle">20</text>
    <text x="0" y="10" font-family="Georgia, serif" font-size="48" font-weight="900" fill="url(#goldGradient)" text-anchor="middle" dominant-baseline="middle" stroke="#020617" stroke-width="1">20</text>

    <!-- Vertices -->
    <circle cx="0" cy="-67" r="5" fill="url(#goldGradient)"/>
    <circle cx="115" cy="-32" r="5" fill="url(#goldGradient)"/>
    <circle cx="115" cy="32" r="5" fill="url(#goldGradient)"/>
    <circle cx="0" cy="65" r="5" fill="url(#goldGradient)"/>
    <circle cx="-115" cy="32" r="5" fill="url(#goldGradient)"/>
    <circle cx="-115" cy="-32" r="5" fill="url(#goldGradient)"/>
  </g>

  <!-- Destellos decorativos -->
  <g filter="url(#glow)">
    <circle cx="160" cy="160" r="3" fill="#7DD3FC" opacity="0.7"/>
    <circle cx="352" cy="160" r="3" fill="#7DD3FC" opacity="0.7"/>
    <circle cx="140" cy="340" r="2" fill="#FCD34D" opacity="0.6"/>
    <circle cx="372" cy="340" r="2" fill="#FCD34D" opacity="0.6"/>
  </g>
</svg>