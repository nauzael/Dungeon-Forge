<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Dungeon Forge</title>
    
    <!-- Prevent FOUC: apply dark class and theme colors before first paint -->
    <script>
      (function() {
        try {
          var t = localStorage.getItem('dungeon-forge-theme');
          var auto = localStorage.getItem('dungeon-forge-theme-auto');
          var isDark = true;
          if (auto === 'true') {
            isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          } else if (t) {
            // Light themes: daylight (only non-dark theme currently)
            isDark = t !== 'daylight';
          }
          if (isDark) document.documentElement.classList.add('dark');
        } catch(e) {}
      })();
    </script>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0F172A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dungeon Forge" />
    <link rel="apple-touch-icon" href="./icon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Spline+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
