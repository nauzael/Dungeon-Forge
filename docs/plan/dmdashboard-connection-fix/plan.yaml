implementation_specification:
  code_structure: |
    1. Create Firebase query layer:
       - queryPartiesForUser(userId: string): Promise<Party[]>
       - queryMembersForParty(partyId: string): Promise<Character[]>
       Location: utils/firebase.ts (new exports)
    
    2. Refactor useDMParty.ts:
       - Remove supabase imports
       - Replace supabase.from().select() with Firebase queries
       - Keep localStorage fallback (isLocalMode check)
       - Error handling: if query fails AND !isLocalMode → fallback to localStorage
    
    3. Fix import paths:
       - DMDashboard.tsx: ../utils/supabase → ../utils/firebase
       - SheetTabs.tsx: ../utils/supabase → ../utils/firebase
       - Verify App.tsx batchSaveCharacters source (Task 2)
    
    4. Cleanup:
       - Verify supabase export not used elsewhere
       - Consider deprecating supabase export (but keep if Login/OAuthDebugConsole need it)

  affected_areas:
    - "useDMParty.ts (core logic): ~100 lines changed"
    - "firebase.ts (new functions): ~80 lines added"
    - "DMDashboard.tsx (import fix): ~1 line"
    - "SheetTabs.tsx (import fix): ~1 line"
    - "App.tsx (verify batchSaveCharacters): 0-50 lines depending on fix"
    - "Login.tsx (verify supabase usage): 0 lines (read-only validation)"
    - "OAuthDebugConsole.tsx (verify supabase usage): 0 lines (read-only validation)"

  component_details:
