      responsibility: "Fetch parties/members from Firestore with error handling and local fallback"
      interfaces:
        - "queryPartiesForUser(userId: string): Promise<Party[]>"
        - "queryMembersForParty(partyId: string, activeCharacterId?: string): Promise<Character[]>"
      dependencies:
        - component: "Firestore SDK"
          relationship: "uses collection(), query(), where() from firebase/firestore"
        - component: "localStorage"
          relationship: "fallback if credentials missing or query fails"
      integration_points:
        - "useDMParty.fetchAllParties()"
        - "useDMParty.fetchMembers()"

