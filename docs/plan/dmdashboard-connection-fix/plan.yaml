  DMDashboard listener stuck in "connecting" because useDMParty.ts calls deprecated Supabase queries.
  Migrate to Firebase Firestore queries (queryPartiesForUser, queryMembersForParty).
  Fix broken imports from non-existent utils/supabase file (batchSaveCharacters, subscribeWithRetry).
  Expected: 50 min total, 7 sequential waves, parallelizable at Wave 3+.

