  - id: task-2-create-firebase-queries
    title: "Create Firebase Firestore query functions"
    description: |
      Add two new functions to utils/firebase.ts:
      
      1. queryPartiesForUser(userId: string): Promise<Party[]>
         - Query Firestore: collection('parties').where('creator_id', '==', userId)
         - Handle errors: log, return []
         - Type: Return Party[] matching existing interface
      
      2. queryMembersForParty(partyId: string): Promise<Character[]>
         - Query Firestore: collection('parties/{partyId}/characters').where('deleted_at', '==', null)
         - OR if flat schema: collection('characters').where('party_id', '==', partyId).where('deleted_at', '==', null)
         - Handle errors: log, return []
         - Type: Return Character[] from data field
      
      Both functions:
      - Should NOT throw; catch errors and log
      - Should return empty array on error (fail silent for local mode fallback)
      - Should use firestore instance (already initialized)
      - Include JSDoc with error behavior
