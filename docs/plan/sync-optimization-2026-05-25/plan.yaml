  # ==================== WAVE 3: Error Handling + Rollback ====================

  - id: "task-3-1"
    title: "Implementar rollback en saveCharacterToCloud()"
    description: |
      Patrón: snapshot → update → on error rollback
      
      ```typescript
      const saveWithRollback = async (character: Character) => {
        const snapshot = JSON.parse(JSON.stringify(character)); // deep copy
        try {
          await saveCharacterToCloud(character);
        } catch (error) {
          // Restaurar snapshot local
          setCharacters(prev => 
            prev.map(c => c.id === character.id ? snapshot : c)
          );
          // Lanzar error para que handler lo procese
          throw new SyncError('Save failed, rolling back', character.id, error);
        }
      };
      ```
      
      Implementar en utils/supabase.ts.
    wave: 3
