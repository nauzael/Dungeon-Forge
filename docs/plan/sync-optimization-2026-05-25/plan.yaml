  # ==================== WAVE 4: Batching de Cambios ====================

  - id: "task-4-1"
    title: "Implementar batching de cambios"
    description: |
      Actualmente: 10 personajes = 10 requests secuenciales.
      Target: 10 personajes = 1 batched request.
      
      Implementar:
      1. Queue de cambios (Map<characterId, Character>)
      2. Debounce global 500ms (agrupa cambios)
      3. saveBatch(characters[]) que envía todos atomically
      4. On error: rollback ALL o NONE (transactional)
      
      Pseudo-código:
      ```typescript
      const pendingChanges = new Map<string, Character>();
      
      const queueSave = (character: Character) => {
        pendingChanges.set(character.id, character);
        debounceFlush();
      };
      
      const flushBatch = async () => {
        const batch = Array.from(pendingChanges.values());
        const snapshots = batch.map(c => ({ ...c }));
        try {
          await saveBatch(batch);
        } catch {
          // Rollback ALL
          batch.forEach(c => rollbackCharacter(snapshots.get(c.id)));
          throw;
        }
      };
      ```
