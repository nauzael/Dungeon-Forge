plan_id: sync-optimization-2026-05-25
objective: |
  Optimizar el sistema de sincronización en Dungeon Forge para reducir pérdida de datos,
  minimizar peticiones al servidor, y mejorar experiencia de usuario. Target: 50x menos 
  cambios perdidos, 10-15x menos peticiones, -20% batería.
created_at: '2026-05-25T00:00:00Z'
created_by: gem-planner
status: pending
research_confidence: high
plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 8
  risk_score: medium

tldr: |
  Plan de 5 waves para arreglar sistema de sincronización: 
  (1) Debounce + dedup listeners, (2) Validación pre-save, (3) Error handling + rollback, 
  (4) Batching de cambios, (5) Testing + docs. Reduce requests 10-15x, errores 50x.
  Arreglos implementados sobre patrones TypeScript strict, React 19 hooks, Supabase realtime.

open_questions:
  - question: ¿Usar debounce global o por componente?
    context: CombatTab.tsx tiene múltiples handlers que actualizan
    type: decision_blocker
    affects: ["task-1-1", "task-1-2"]
  - question: ¿Batch endpoint en Supabase o manual en frontend?
    context: Firebase + Supabase dual backend
    type: decision_blocker
    affects: ["task-4-1"]

gaps:
  - description: |
      Tests de sincronización - sin framework de testing actual.
      Plan asume mock tests o manual validation.
    refinement_requests:
      - query: E2E testing para offline → online scenarios
        source_hint: gem-browser-tester puede hacer pruebas manuales

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: |
        Debounce implementado incorrectamente causa race condition:
        User A cambia HP, se debouncea, se envía al servidor. User B hace cambio
        local antes de que llegue respuesta. Timestamp diferente causa conflicto.
      likelihood: medium
      impact: critical
      mitigation: |
        Implementar optimistic updates + snapshot rollback en task-3-2.
        Revisar timestamp handling en utils/supabase.ts. Agregar tests de
        collision detection con gem-browser-tester.
    
    - scenario: |
        localStorage corrupción: Data inválida se carga y propaga a cloud,
        sincronizando basura a todos los dispositivos del usuario.
      likelihood: medium
      impact: high
      mitigation: |
        task-2-3 implementa isValidCharacter() strict. Agregar try/catch
        en load inicial (task-2-3). Revertir a backup si detección de corrupción.
    
    - scenario: |
        Listener deduplicación falla: Mismo personaje editado desde 3 tabs,
        3 listeners se disparan en paralelo, pierden cambios de uno.
      likelihood: medium
      impact: high
      mitigation: |
        task-1-3 implementa dedup por character.id + timestamp. Usar Set interno.
        Agregar logging para detectar si duplicates pasan.
    
    - scenario: |
        Rollback parcial: Si batching falla a mitad, algunos personajes se
        guardan otros no. Cliente queda inconsistente.
      likelihood: low
      impact: critical
      mitigation: |
        task-4-1 usa atomic transactions o Promise.allSettled() con
        rollback total si alguno falla. task-3-3 maneja esto.

  assumptions:
    - Supabase realtime channels están configurados correctamente
    - Firebase auth + Supabase auth están sincronizados
    - localStorage disponible en todos targets (web + mobile)
    - Timestamps de servidor son confiables (NTP sincronización)
    - User interacción típica: <5 cambios/segundo por personaje

implementation_specification:
  code_structure: |
    Cambios en 5 áreas core:
    1. **utils/hooks/useDebounce.ts** - Hook personalizado de debounce
    2. **components/sheet/CombatTab.tsx** - Aplicar debounce a handlers
    3. **App.tsx** - Deduplicar listeners, agregar error states
    4. **utils/supabase.ts** - Agregar rollback, batching, validación
    5. **types.ts** - Agregar tipos para SyncState, ValidationResult
    
    Patrón de validación:
    ```typescript
    const isValidCharacter = (char: Character): ValidationResult => {
      if (!char.id) return { valid: false, error: 'Missing ID' };
      if (isNaN(char.hp.current)) return { valid: false, error: 'Invalid HP' };
      // ... más checks
      return { valid: true };
    };
    ```
    
    Patrón de rollback:
    ```typescript
    const saveWithRollback = async (character: Character) => {
      const snapshot = { ...character };
      try {
        await supabase.from('characters').update(character);
      } catch (e) {
        setCharacters(prev => prev.map(c => c.id === character.id ? snapshot : c));
        throw e;
      }
    };
    ```

  affected_areas:
    - utils/supabase.ts (sync logic)
    - utils/hooks/useDebounce.ts (new)
    - components/sheet/CombatTab.tsx (debounce handlers)
    - App.tsx (listener dedup)
    - types.ts (SyncState enum)
    - index.css (sync status indicator)

  component_details:
    - component: Debounce Hook
      responsibility: |
        Reusable hook para debounce de callbacks.
        Config: 500ms min para cloud sync, 100ms para UI.
      interfaces:
        - "useDebounce<T>(value: T, delay: number): T"
        - "useDebouncedCallback<T, R>(callback: (arg: T) => R, delay: number): (arg: T) => void"
      dependencies:
        - component: CombatTab
          relationship: utilizado por
        - component: InventoryTab
          relationship: utilizado por
      integration_points:
        - "Called on every HP/ability change"
        - "Returns debounced value for conditional render"
    
    - component: Validation Layer
      responsibility: |
        Prevenir valores inválidos antes de guardar.
        Incluye sanitización de NaN, Infinity, nulls.
      interfaces:
        - "isValidCharacter(char: Character): ValidationResult"
        - "isValidInventoryItem(item: InventoryItem): ValidationResult"
        - "sanitizeCharacterData(char: Character): Character"
      dependencies:
        - component: CombatTab
          relationship: llamado por
        - component: localStorage
          relationship: validar al cargar
      integration_points:
        - "Pre-save validation en App.tsx"
        - "Load validation en useEffect inicial"
    
    - component: Error State Manager
      responsibility: |
        Mantener estado de sync (idle/syncing/success/error).
        Exponer al UI via context o state.
      interfaces:
        - "SyncState: 'idle' | 'syncing' | 'success' | 'error'"
        - "useSyncState(): { state, lastError, clearError }"
      dependencies:
        - component: Toast
          relationship: notificar errores
        - component: All tabs
          relationship: consume state
      integration_points:
        - "Renderizar tooltip en header si error"
        - "Mostrar toast en cambio de error"
    
    - component: Batching Engine
      responsibility: |
        Agrupar múltiples cambios en single request.
        Implementar con queue + debounce.
      interfaces:
        - "saveBatch(characters: Character[]): Promise<Result[]>"
        - "queueSave(character: Character): Promise<void>"
      dependencies:
        - component: supabase.ts
          relationship: base de datos
      integration_points:
        - "Called on debounce timeout"
        - "Returns atomic success/fail"

