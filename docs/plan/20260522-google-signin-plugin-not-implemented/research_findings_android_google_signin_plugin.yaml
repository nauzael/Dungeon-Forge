tldr: |
  - El error "plugin not implemented" se explica por falta de registro nativo en MainActivity: actualmente extiende BridgeActivity sin registerPlugin.
  - El plugin Java ya tiene @CapacitorPlugin(name = "GoogleSignIn"), pero los métodos expuestos a JS no están anotados con @PluginMethod.
  - El contrato JS está alineado con el nombre "GoogleSignIn" vía registerPlugin en googleSignInNative.ts.
  - Se definió diff conceptual exacto para MainActivity.java y GoogleSignInPlugin.java, más secuencia PowerShell de validación y señales logcat.
  - Falta docs/PRD.yaml en este workspace; se documenta como gap no bloqueante para este fix puntual.

