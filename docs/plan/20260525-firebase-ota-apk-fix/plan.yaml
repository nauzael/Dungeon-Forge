    flows:
      - flow_id: "OTA_HAPPY_PATH"
        description: "Flujo exitoso: startup → check → download → apply"
        setup:
          - "Device conectado con network"
          - "Firebase Storage accessible"
          - "version.json en Storage con versión > app actual"
        steps:
          - "Abrir app por primera vez"
          - "OTA check se ejecuta automáticamente"
          - "UI muestra 'Update available'"
          - "Usuario acepta actualización"
          - "App descarga nuevo build"
          - "App aplica update"
          - "App reinicia"
        expected_state:
          - "App versión actualizada"
          - "localStorage contiene nueva version"
          - "Logs muestran 'CapacitorUpdater.set() success'"
        teardown:
          - "Documentar versión final"
          - "Screenshot de success"
      
      - flow_id: "OTA_ERROR_NETWORK"
        description: "Error path: red desconectada"
        setup:
          - "Device sin internet"
        steps:
          - "Abrir app"
          - "OTA check intenta pero falla"
        expected_state:
          - "UI muestra error message"
          - "App sigue funcionando"
          - "No hay crash ni stack trace visible"
        teardown:
          - "Screenshot del error UI"
    verification:
      - "OTA check se ejecuta en startup"
      - "version.json se fetch exitosamente"
      - "Error handling UI es visible (no solo logs)"
      - "No hay crashes ni unhandled errors"
      - "App permanece funcional después de error"
    acceptance_criteria:
      - "APK instala y ejecuta sin crash"
      - "OTA check completado en startup"
      - "Si hay versión nueva, es detectada y descargada"
      - "Error handling visual funciona"
      - "Evidence documentada (screenshots, logcat)"

  - id: "T5.2_test_rollback"
    title: "Validar script restore_ota.mjs en production"
    description: |
      Probar rollback de versión:
      
      Prerequisite:
      - Tener 2+ versiones en Firebase Storage (actual + anterior)
      - Notas de cuáles son las versiones (ver ota-release/version.json)
      
      Test Steps:
      1. Documentar versión actual en device:
         ```
         adb shell dumpsys package com.tupaquete.dndcompanion | grep versionName
         ```
      
      2. Ejecutar rollback a versión anterior:
         ```
         node scripts/restore_ota.mjs 1.0.0-2026.4.16-182359 "Rollback para testing"
         ```
      
      3. Verificar que version.json en Storage fue actualizado:
         ```
         curl https://storage.googleapis.com/dungeon-forge-prod.firebasestorage.app/version.json
         ```
      
      4. En device, abrir app y esperar OTA check:
         - App debe detectar que version anterior está disponible
         - (O versión sigue igual si remote < local)
      
      5. Verificar audit log:
         - Firebase Storage debe mostrar nuevo ZIP upload si restoring
         - Timestamp de actualización en version.json
      
      Rollback en caso de error:
      - Ejecutar restore_ota.mjs con versión anterior correcta
      - Verificar que version.json volvió a la normal
    wave: 5
    agent: "gem-devops"
    prototype: false
    covers: ["Rollback script validation", "disaster recovery"]
    priority: "medium"
    status: "pending"
    dependencies: ["T3.1_enhance_restore_ota", "T5.1_install_and_test_ota"]
    context_files:
      - path: "scripts/restore_ota.mjs"
        description: "Script a validar"
      - path: "ota-release/version.json"
        description: "Current version tracking"
    estimated_effort: "small"
    estimated_files: 0  # CLI testing
    estimated_lines: 0
    verification:
      - "restore_ota.mjs ejecuta sin error"
      - "version.json en Storage actualizado"
      - "ZIP anterior en bucket es alcanzable"
      - "Audit trail documentado"
    acceptance_criteria:
      - "Script rollback validado funcionalmente"
      - "version.json actualizado correctamente"
      - "No hay errores o uploads fallidos"

  - id: "T5.3_final_validation"
    title: "Validación final y cierre de plan: OTA E2E funcional"
    description: |
      Consolidar evidencia de E2E y emitir quality gate:
      
      Checklist Final:
      - [ ] google-services.json en android/app/ ✓ (T2.1)
      - [ ] CORS configurado en Storage ✓ (T2.2)
      - [ ] restore_ota.mjs mejorado ✓ (T3.1)
      - [ ] Error handling UI en App.tsx ✓ (T3.2)
      - [ ] APK compila sin errores ✓ (T4.1)
      - [ ] APK valida estructura OK ✓ (T4.2)
      - [ ] OTA check funciona en device ✓ (T5.1)
      - [ ] Rollback script valida ✓ (T5.2)
      
      Documentación:
      - Resumen de cambios con commit hashes
      - Evidence: screenshots, logcat, curl tests
      - Known limitations o deuda técnica
      - Next steps para future improvements
      
      Quality Gate Decision:
      - PASS: Todos los tests pasaron, OTA E2E funcional
      - CONDITIONAL: Issues menores, non-blocking
      - FAIL: Bloqueante encontrado, requiere fix
      
      Deliverables:
      - SOLUTION-COMPLETE-FIREBASE-OTA.md
      - Screenshots y evidencia en docs/plan/20260525-firebase-ota-apk-fix/
      - Git commits documentados
    wave: 5
    agent: "gem-reviewer"
    prototype: false
    covers: ["Quality gate", "documentation", "closure"]
    priority: "high"
    status: "pending"
    dependencies: ["T5.1_install_and_test_ota", "T5.2_test_rollback"]
    context_files:
      - path: "AGENTS.md"
        description: "Referencia de estado OTA"
      - path: ".claude/CLAUDE.md"
        description: "Context de proyecto"
    estimated_effort: "small"
    estimated_files: 1
    estimated_lines: 200
    verification:
      - "Todos los acceptance criteria de T5.1 y T5.2 satisfechos"
      - "Documentación completa"
      - "Quality gate decision clara"
    acceptance_criteria:
      - "OTA end-to-end funcional en APK real"
      - "Documentación de solution completada"
      - "Plan marcado como COMPLETED"
      - "Next steps documentados para future work"

  # ==================== CONTINGENCY: BUILD FAILURE ====================
  
  - id: "CONTINGENCY_build_failure"
    title: "[CONTINGENCY] Diagnosticar y remediar build failure en T4"
    description: |
      Si T4.1_build_apk falla, ejecutar este plan de recuperación:
      
      Diagnosis Steps:
      1. Capturar error completo de gradle:
         ```
         ./gradlew clean assembleDebug 2>&1 | tee build-error.log
         ```
      
      2. Clasificar error:
         - Plugin registration: "cannot find symbol GoogleSignInPlugin"
         - Resource not found: "google-services.json not found"
         - Gradle sync: "Could not resolve dependency"
         - Capacitor: "capacitor plugin missing"
      
      3. Root cause analysis:
         - Verificar que google-services.json existe en android/app/
         - Verificar build.gradle syntax
         - Ejecutar `npx cap sync android --no-build` para resetear plugins
         - Validar local.properties tiene paths correctos
      
      4. Remediation:
         - Si plugin: agregar registerPlugin en MainActivity
         - Si file: verificar path y permisos
         - Si gradle: limpiar .gradle/ y reintentar
      
      5. Retry:
         - `./gradlew clean`
         - `npx cap sync android`
         - `./gradlew assembleDebug`
      
      Escalation:
      - Si falla después de retry: documentar error y escalar a gem-debugger
      - Crear issue JIRA con error log + context
    wave: 4
    agent: "gem-debugger"
    prototype: false
    covers: ["Build failure recovery", "error diagnosis"]
    priority: "high"
    status: "pending"
    dependencies: ["T4.1_build_apk"]
    conflicts_with: []
    context_files:
      - path: "android/"
        description: "Android project"
      - path: ".gradle/"
        description: "Gradle cache (puede necesitar clean)"
    estimated_effort: "medium"
    estimated_files: 0
    estimated_lines: 0
    failure_modes:
      - scenario: "google-services.json corrupto o missing"
        likelihood: "low"
        impact: "high"
        mitigation: "Verificar T2.1 completado; re-copiar archivo de docs/"
      
      - scenario: "Plugin registration falla"
        likelihood: "medium"
        impact: "high"
        mitigation: "Ejecutar npx cap sync --no-build; agregar @Override en MainActivity"
    verification:
      - "Root cause identificado y documentado"
      - "Fix aplicado"
      - "Retry de build exitoso"
    acceptance_criteria:
      - "Build success o escalación a gem-debugger"
      - "Lecciones aprendidas documentadas para future builds"

---
# END OF PLAN YAML
