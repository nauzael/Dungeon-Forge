    description: |
      Mejorar UX de actualización OTA en App.tsx:
      
      1. Extender OTAUpdate interface en types.ts:
         ```typescript
         interface OTAUpdate {
           version: string;
           message?: string;
           payload?: any;
           error?: string;  // NEW
           status?: 'pending' | 'downloading' | 'ready' | 'error';  // NEW
