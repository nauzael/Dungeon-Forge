pre_mortem:
  overall_risk_level: "medium"
  critical_failure_modes:
    - scenario: "google-services.json tiene credenciales inválidas o desactulizadas"
      likelihood: "low"
      impact: "critical"
      mitigation: "Verificar credenciales con Firebase Console antes de mover; test build inmediatamente después"
    
    - scenario: "CORS no configurado correcta en Storage; APK no puede descargar version.json"
      likelihood: "medium"
      impact: "critical"
      mitigation: "Validar CORS antes de deploy; test fetch desde WebView en APK real"
    
    - scenario: "Build APK falla por plugin Google Sign-In no registrado"
      likelihood: "medium"
      impact: "high"
      mitigation: "Verificar MainActivity.java tiene registerPlugin(GoogleSignInPlugin.class); si falla, ejecutar `npx cap sync android`"
    
    - scenario: "APK compilado pero OTA aún no funciona end-to-end"
      likelihood: "low"
      impact: "high"
      mitigation: "Tener versión anterior del APK para rollback; usar adb logcat para debugging"
  
  assumptions:
    - Firebase proyecto 'dungeon-forge-prod' tiene credenciales válidas en .env
    - Capacitor 6 + CapacitorUpdater v6.0.0 son compatibles
    - Android NDK + SDK están instalados en local.properties
    - Dispositivo Android conectado para testing
    - Network en APK puede alcanzar storage.googleapis.com

implementation_specification:
  code_structure: |
    Cambios afectarán 4 áreas principales:
    1. **Android Build**: google-services.json location, build.gradle plugin config
    2. **Scripts OTA**: restore_ota.mjs mejorado, validaciones de archivo
    3. **React App**: Error handling UI, estados de actualización visual
    4. **Firebase**: CORS rules, acceso público a version.json

  affected_areas:
    - "android/app/google-services.json (NEW - mover desde docs/)"
    - "android/app/build.gradle (apply plugin fix)"
    - "scripts/restore_ota.mjs (mejorar error handling)"
    - "App.tsx (agregar error handling visual)"
    - "types.ts (extender OTAUpdate interface si necesario)"
    - "firebase.json o Firebase Console (CORS config)"

  component_details:
    - component: "Google Services Plugin"
      responsibility: "Registrar credenciales Android en gradle build"
      interfaces: ["android/app/google-services.json → build.gradle"]
      dependencies:
        - component: "build.gradle"
          relationship: "apply plugin: 'com.google.gms.google-services' después de plugin 'com.android.application'"
      integration_points: ["Gradle build task", "APK binary"]
    
    - component: "OTA Update Check"
      responsibility: "Fetch version.json desde Firebase Storage en App startup"
      interfaces: ["fetch(https://storage.googleapis.com/{bucket}/version.json)"]
      dependencies:
        - component: "Firebase Storage CORS"
          relationship: "Debe permitir GET sin Authorization header"
      integration_points: ["App.tsx useEffect", "CapacitorUpdater.download()"]
    
    - component: "Restore OTA Script"
      responsibility: "Rollback a una versión anterior específica"
      interfaces: ["node restore_ota.mjs {targetVersion} {message}"]
      dependencies:
        - component: "Firebase Admin SDK"
          relationship: "Service account JSON para auth a Storage"
      integration_points: ["CLI", "version.json update", "Firebase Storage upload"]
    
    - component: "OTA Error Handler"
      responsibility: "Capturar y mostrar errores de actualización visualmente"
      interfaces: ["updateAvailable state → UI error toast/modal"]
      dependencies:
        - component: "App.tsx state"
          relationship: "updateAvailable: OTAUpdate | null"
      integration_points: ["Error catch blocks", "User feedback UI"]

