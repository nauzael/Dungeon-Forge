      2. Agregar error states en App.tsx OTA handler:
         - Capturar error en download()
         - Capturar error en set()
         - Mostrar toast/modal con error message
         - Permitir retry o dismiss
      
      3. UI improvement:
         - Mostrar progress durante download (si CapacitorUpdater soporta)
         - Toast con "Update downloaded, aplicando..."
         - Error modal con "Falló, intenta más tarde"
      
      4. Actualizar checkForUpdates():
