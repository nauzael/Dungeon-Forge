        steps:
          - "Conectar device Android"
          - "adb install -r app-debug.apk"
          - "Abrir app"
          - "Esperar 5s"
          - "adb logcat | grep -i ota"
        expected_result: "Logs muestran 'fetch version.json' sin error"
      
      - scenario: "OTA download si hay versión nueva"
        steps:
          - "Verificar que version.json en Storage tiene versión > app.version"
          - "Abrir app"
          - "Observar UI"
        expected_result: "UI muestra 'Update available' y CapacitorUpdater inicia download"
      
      - scenario: "Error handling sin network"
