  # ==================== WAVE 5: E2E TESTING & VALIDATION ====================
  
  - id: "T5.1_install_and_test_ota"
    title: "Instalar APK en device y validar OTA end-to-end"
    description: |
      E2E OTA flow en device Android real:
      
      Setup:
      - Conectar device Android via USB
      - `adb devices` para validar conexión
      - `adb install -r android/app/build/outputs/apk/debug/app-debug.apk`
      
      Test 1: OTA Check on Startup
      - Abrir app
      - Esperar 3-5 segundos
      - Verificar en `adb logcat` que fetch version.json completa exitosamente
      - Buscar mensajes: "Downloading new OTA update" o similar
      
      Test 2: OTA Download (si hay versión nueva)
      - Si version.json mostró update disponible
      - Verificar UI muestra "Update available" message
      - Capturar logs de CapacitorUpdater.download()
      
      Test 3: Error Handling
      - Desactivar network: `adb shell pm set-insecure-user-id off`
      - Iniciar app y verificar que error handling UI muestra mensaje claro
      - No debe mostrar logs crudos al usuario
      
      Test 4: localStorage OTA state
      - Verificar que app_version se guarda en localStorage
      - Comparar con version.json remota
      
      Captura de evidencia:
      - Screenshots de UI
      - `adb logcat` output filtrado
      - curl test de version.json desde device
    wave: 5
    agent: "gem-mobile-tester"
    prototype: false
    covers: ["OTA E2E testing", "APK runtime validation"]
    priority: "high"
    status: "pending"
    dependencies: ["T4.1_build_apk", "T4.2_validate_build"]
