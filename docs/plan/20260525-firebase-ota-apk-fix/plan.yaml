tldr: |
  5-wave plan para arreglar Firebase OTA en APK:
  
  1. **Wave 1 (Research)**: Análisis de google-services.json, CORS Storage, y estado de restore_ota.mjs
  2. **Wave 2 (Fix Critical)**: Mover google-services.json a android/app/, configurar CORS
  3. **Wave 3 (Error Handling)**: Agregar UI para errores OTA, mejorar restore_ota.mjs
  4. **Wave 4 (Build)**: Compilar APK, validar sin errores
  5. **Wave 5 (Validation)**: Test E2E OTA, rollback, y cierre

