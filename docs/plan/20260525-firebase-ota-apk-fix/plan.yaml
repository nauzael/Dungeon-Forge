      Steps:
      1. Verificar que local.properties tiene android.sdk.path
      2. `npm run build` - compilar React/TypeScript
      3. `npx cap sync android` - sincronizar cambios
      4. `cd android && ./gradlew assembleDebug` - build APK
      
      Validación:
      - BUILD SUCCESSFUL en log de gradle
      - APK generado en android/app/build/outputs/apk/debug/app-debug.apk
      - No hay errores de plugin Google Sign-In
      - No hay errores de TypeScript
      
      Si falla:
      - Capturar error log completo
      - Documentar root cause
      - Ejecutar `./gradlew clean` si es necesario
    wave: 4
    agent: "gem-devops"
    prototype: false
    covers: ["APK compilation", "build validation"]
    priority: "high"
    status: "pending"
    dependencies: ["T2.1_move_google_services", "T2.2_configure_cors", "T3.1_enhance_restore_ota", "T3.2_add_error_ui"]
    context_files:
