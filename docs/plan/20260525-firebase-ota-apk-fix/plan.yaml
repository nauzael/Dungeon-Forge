      - "No hay errores bloqueantes"

  - id: "T4.2_validate_build"
    title: "Validar APK: estructura, permisos, plugins registrados"
    description: |
      Post-build validation:
      
      1. Validar APK estructura:
         ```
         unzip -l android/app/build/outputs/apk/debug/app-debug.apk | grep google-services
         ```
      
      2. Verificar permisos AndroidManifest:
         - INTERNET (requerido para OTA fetch)
         - ACCESS_NETWORK_STATE
         - READ_EXTERNAL_STORAGE (si Capacitor lo requiere)
      
      3. Checar plugin registration:
         - AndroidManifest debe tener deeplink intent filter para OAuth
         - MainActivity debe registrar GoogleSignInPlugin
      
      4. Validar Firebase SDK incluido:
         ```
