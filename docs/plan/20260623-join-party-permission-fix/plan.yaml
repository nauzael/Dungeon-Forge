  - "Deploy (T5) should target production rules; have rollback plan ready"

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "isPartyMember() returns false for existing party members who joined before this fix and whose subcollection entry was never created (e.g., if joinParty failed before step 3)"
      likelihood: low
      impact: high
      mitigation: "The subcollection entry (step 3 in joinParty) runs BEFORE the failing step 4. Most join attempts that hit the error at step 4 still have step 3's subcollection entry written. For edge cases where subcollection doesn't exist, the player can re-join via code. DM can also manually re-create if needed."
    - scenario: "Firestore security rules syntax error causes all party operations to fail"
      likelihood: low
      impact: critical
      mitigation: "Deploy to a test Firebase project first, or use firebase emulators to validate rules before production deploy. T5 specifically validates rules syntax."
  assumptions:
    - "The members subcollection doc written by joinParty() step 3 always succeeds because the security rule allows create: if isAuth() && uid() == memberId"
    - "No other code reads the party doc's members map field for functional purposes (only isPartyMember() in rules uses it)"
    - "Firebase CLI is available for rules deployment"
    - "Existing parties with stale members map data are unaffected by this change"

implementation_specification:
  - "T1: Change isPartyMember() in firestore.rules from get()-based field check to exists()-based subcollection check. No other rule changes needed."
  - "T2: Remove the updateDoc(partyRef, {[`members.${effectiveUserId}`]: {...}}) block from joinParty() in utils/firebase/db.ts (lines 416-428). Keep the broadcastCharacterUpdate block that follows."
  - "T3: Remove members: {} from createParty() party data (db.ts line 297)."
  - "T4: Remove the '2c. Clean up party members map' block from removeFromParty() in db.ts (lines 587-596). The subcollection cleanup at 2b (lines 576-585) remains as the source of truth."
  - "T5: Deploy rules via firebase deploy --only firestore:rules"
  - "T6: Manual smoke test: create party with DM, join with player, verify member appears in DM list, verify player can access campaign resources."

