plan_id: "20260623-join-party-permission-fix"
objective: "Fix 'Missing or insufficient permissions' when players join a party via code — caused by updateDoc(partyRef, {members.{uid}}) failing Firestore rules. Fix isPartyMember() to check members subcollection instead of party doc members map, and remove failing updateDoc from joinParty()."
created_at: "2026-06-23"
created_by: "gem-planner"
status: approved
tldr: |
  Root cause: joinParty() step 4 calls updateDoc(partyRef, {[`members.${uid}`]: {...}}) to update
  the party document's members map. Firestore rules require isPartyDM(partyId) for party doc updates,
  which fails for players joining via code (they are NOT the DM). This causes the entire joinParty()
  call to throw "Missing or insufficient permissions".

  Additionally, isPartyMember() reads partyDoc.members[uid()] from the party doc's members map.
  Since step 4 always fails for non-DM joiners, the map is never populated for players who join via
  code. So isPartyMember() always returns false for these players, blocking access to campaign
  resources and party resources.

  Fix (Option C — Both):
  - Change isPartyMember() to check the members subcollection via exists() instead of the party
    doc's members map. The subcollection is already successfully written by joinParty() step 3
    (allow create: if isAuth() && uid() == memberId).
  - Remove the failing updateDoc step 4 from joinParty() entirely — it's no longer needed.
  - Clean up: remove dead members map initialization from createParty().
  - Clean up: remove dead members map cleanup from removeFromParty() (subcollection is source of truth).

  Migration safety: Existing parties with members map data are unaffected — the map just becomes
  unused read-only data. No data migration needed.

  Wave 1 (parallel, no deps):
    T1: Fix isPartyMember() in firestore.rules — use exists() on members/{uid} subcollection
    T2: Remove updateDoc step 4 from joinParty() — failing call is no longer needed
    T3: Remove members: {} initialization from createParty() — dead field
    T4: Remove members map cleanup from removeFromParty() — dead code, subcollection is source of truth
  Wave 2:
    T5: Deploy Firestore rules to Firebase
  Wave 3:
    T6: Build verification + smoke test the join flow

plan_metrics:
  wave_1_task_count: 4
  total_dependencies: 3
  risk_score: medium
quality_warnings:
  - "Rules change affects isPartyMember() used by campaign_resources and party resources — verify players can access resources after joining"
