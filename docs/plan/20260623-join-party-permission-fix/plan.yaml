  # WAVE 1 — Core fixes (parallel, independent)
  # ───────────────────────────────────────────────────────────────────────
  - id: "T1_fix_isPartyMember_rules"
    title: "Change isPartyMember() to check members subcollection using exists()"
    description: |
      ROOT CAUSE FIX: The current isPartyMember() function reads the party document's `members`
      map field and checks if the current user's UID exists as a key:
        let partyDoc = get(/databases/$(database)/documents/parties/$(partyId)).data;
        return partyDoc.members[uid()] != null;

      This fails for players who join via code because joinParty() step 4 (which writes to this
      map) is rejected by Firestore rules. The map never gets populated for non-DM joiners.

      FIX: Change isPartyMember() to check the members subcollection instead:
        function isPartyMember(partyId) {
          return exists(/databases/$(database)/documents/parties/$(partyId)/members/$(uid()));
        }

      This works because joinParty() step 3 already successfully writes to this subcollection:
        allow create: if isAuth() && uid() == memberId;

      Benefits:
      - Uses exists() which is 1 read (same cost as get()) but semantically cleaner
      - Doesn't depend on the party doc's members map being populated
      - Works correctly for all join flows

      Downstream effects: isPartyMember() is used in:
      - /parties/{partyId}/resources read (line 123)
      - /campaign_resources/{resourceId} read (line 153)
      These will now correctly grant access to players who joined via code.
