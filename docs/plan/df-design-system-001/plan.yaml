# ═══════════════════════════════════════════════════════════════════════════
# PLANNING ANALYSIS (LOW complexity → minimal)
# ═══════════════════════════════════════════════════════════════════════════
open_questions:
  - question: "Should radius-lg (12px) and radius-xl (16px) replace or coexist with --border-radius-lg (8px) and --border-radius-xl (12px)?"
    context: "DS defines --radius-lg:12px and --radius-xl:16px which differ from existing --border-radius-lg:8px and --border-radius-xl:12px. Rule says 'never rename existing' — so both sets coexist."
    type: decision_blocker
    affects: ["T1:index.css", "T5:ThemeContext", "T6:Build Verify"]

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: "TypeScript strict mode rejects optional fields on existing interfaces"
      likelihood: low
      impact: medium
      mitigation: "All new fields marked optional (?), no required changes to existing theme objects."
    - scenario: "CSS circular references in DS alias vars (--bg: var(--color-background) resolves correctly)"
      likelihood: very_low
      impact: low
      mitigation: "Aliases reference existing --color-* vars which are set by ThemeContext at runtime."
    - scenario: "Build succeeds but runtime theme context tries to access undefined optional fields"
      likelihood: low
      impact: low
      mitigation: "Use ?? operator with fallback values in ThemeContext.setProperty calls."
  assumptions:
    - "All existing --color-* CSS vars remain unchanged."
    - "Tailwind v3 compatibility is maintained — no v4 syntax or directives."
    - "New DS alias vars (--bg, --fg, etc.) reference existing --color-* vars, duplicating none."
    - "Build verification after each wave catches regressions immediately."

