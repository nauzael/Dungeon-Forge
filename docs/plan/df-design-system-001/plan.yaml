# PLAN: Dungeon Forge Design System Integration
# ═══════════════════════════════════════════════════════════════════════════
plan_id: df-design-system-001
objective: Integrate the Dungeon Forge Design System (reverse-engineered from codebase, ~72 tokens) into the production app by adding ~50 new CSS custom properties, extending TypeScript theme interfaces, updating 5 theme definitions, extending Tailwind config, and ensuring utility class parity. No Tailwind v4 migration. All changes additive-only.
created_at: "2026-06-19T05:36:00Z"
created_by: gem-planner
status: pending
tldr: |
  Add ~50 new design tokens as CSS vars in index.css (type scale, spacing, motion, elevation,
  container, icon, decorative, DS aliases). Extend ThemeType interfaces with optional fields.
  Update all 5 themes with new values. Extend tailwind.config.js with new mappings.
  Update ThemeContext to apply new runtime vars. Verify utility class parity.
  Build after each wave. No renames, no v4, no breaking changes.

