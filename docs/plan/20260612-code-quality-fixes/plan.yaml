  - id: "T8_harden_debug_panel"
    title: "Harden DebugPanel.tsx console monkey-patching"
    description: |
      DebugPanel.tsx replaces global console.log/error/warn methods (lines 24-78).
      Issues:
      - Multiple mounts accumulate patching layers (each mount saves then replaces)
      - No guard against multiple simultaneous patches

      Fix: Add a module-level flag to prevent double-patching. Use a single reference
      to track whether patching is active. On cleanup, only restore if we did the patching.
      Also add a guard: if console.log is already patched (not the original), skip re-patching.

      This is debug-only code so low impact, but should be correct.
    wave: 3
    agent: gem-implementer
