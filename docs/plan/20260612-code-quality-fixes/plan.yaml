  - id: "T1_fix_debug_logger_reverse"
    title: "Fix .reverse() array mutation in debugLogger.ts"
    description: |
      Line 113: `this.events.reverse().find(...)` mutates the events array in-place,
      reversing log order on every call to getSummary(). Replace with `this.events.findLast(e => e.level === 'error')`
      which is clean, non-mutating, and semantically correct. findLast is available in ES2023+
      and Vite target supports it.
    wave: 1
    agent: gem-implementer
    status: completed
    covers:
      - "Bug #1: debugLogger.ts:113 — .reverse() mutates array"
    dependencies: []
    conflicts_with: []
    context_files:
      - path: "utils/debugLogger.ts"
        description: "DebugLogger singleton; line 113 has the mutating .reverse().find()"
    flags:
      flaky: false
      retries_used: 0
      requires_design_validation: false
    acceptance_criteria:
      - "getSummary().lastError returns the most recent error event without mutating events array"
      - "Calling getSummary() multiple times does not change event order"
    success_criteria:
      - "Line 113 changed from `this.events.reverse().find((e) => e.level === 'error')` to `this.events.findLast((e) => e.level === 'error')`"
      - "No other lines modified"
      - "npm run build succeeds"
    handoff:
      do_not_reinvestigate:
        - "Class structure of DebugLogger"
        - "Other methods in debugLogger.ts"
      required_test_first: "none"
      target_files:
        - "utils/debugLogger.ts"
      minimal_change: "Replace line 113 only"
      acceptance_checks:
        - "grep -n 'findLast' utils/debugLogger.ts returns line 113"
        - "grep -n 'reverse' utils/debugLogger.ts returns nothing"

  - id: "T2_fix_operator_precedence"
    title: "Fix operator precedence bug in googleSignInNative.ts"
    description: |
      Line 44: String concatenation (`'... ' + (error as any).code`) always produces a truthy
      string, so the `|| (error as Error).constructor.name` fallback never fires.
      Fix: wrap fallback in parens AND eliminate `as any` by using typed access.
      Change to: `'... ' + ((error as { code?: string }).code || (error as Error).constructor.name)`
    wave: 1
    agent: gem-implementer
    status: completed
    covers:
      - "Bug #2: googleSignInNative.ts:44 — Operator precedence bug"
      - "Bug #5: googleSignInNative.ts line 44 — any type violation"
    dependencies: []
    conflicts_with: []
    context_files:
      - path: "utils/googleSignInNative.ts"
        description: "Native Google Sign-In bridge; line 44 has precedence + any bugs"
    flags:
      flaky: false
      retries_used: 0
      requires_design_validation: false
    acceptance_criteria:
      - "When error has a .code property, the log output shows the code value"
      - "When error has no .code property, the log output shows the constructor name"
      - "No `any` type on line 44"
    success_criteria:
      - "Line 44 uses `(error as { code?: string }).code` instead of `(error as any).code`"
      - "Line 44 wraps the fallback with parens: `+ ((error as { code?: string }).code || (error as Error).constructor.name)`"
      - "npm run build succeeds"
    handoff:
      do_not_reinvestigate:
        - "Full file structure of googleSignInNative.ts"
      required_test_first: "none"
      target_files:
        - "utils/googleSignInNative.ts"
      minimal_change: "Fix line 44 only"
      acceptance_checks:
        - "grep -n 'as any' utils/googleSignInNative.ts returns nothing"
        - "grep -n 'code?:' utils/googleSignInNative.ts returns line 44"

