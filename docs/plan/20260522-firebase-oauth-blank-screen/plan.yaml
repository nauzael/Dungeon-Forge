plan_id: 20260522-firebase-oauth-blank-screen
objective: Implement definitive fix for Android blank screen on Google login in Capacitor plus Firebase while preserving web redirect behavior
created_at: "2026-05-22"
created_by: GitHub Copilot (gem-planner)
status: pending
research_confidence: high
plan_metrics:
  wave_1_task_count: 4
  total_dependencies: 23
  risk_score: high
tldr: |
  Build a contract-safe split auth flow: Android uses native provider credential exchange to Firebase,
  web keeps redirect flow. Remove legacy Supabase hash callback assumptions from app lifecycle,
  and gate each wave with integration checks plus explicit rollback points.
open_questions:
  - question: Is the team approved to add and maintain a native Google sign-in dependency for Android runtime?
    context: Recommended option requires a native provider bridge before Firebase credential exchange.
    type: decision_blocker
    affects: [T05]
  - question: Should legacy hash-based callback compatibility be fully removed or kept behind a temporary kill switch?
    context: Legacy deep-link token hash logic conflicts with Firebase contract and can reintroduce blank screen race conditions.
    type: decision_blocker
    affects: [T08, T12]
gaps:
  - description: docs/PRD.yaml is not present, so acceptance mapping uses user objective, AGENTS guidance, and research artifact only.
    refinement_requests:
      - query: Provide product-level non-functional constraints for auth latency and allowed plugin footprint.
        source_hint: docs/PRD.yaml
  - description: No single canonical failing trace bound to one APK build and one OAuth stage.
    refinement_requests:
      - query: Capture one deterministic trace from tap login to post-return state with timestamps and build id.
        source_hint: adb logcat plus release metadata
pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: Native provider returns token but Firebase credential exchange fails due to SHA or OAuth client mismatch.
      likelihood: medium
      impact: critical
      mitigation: Validate Android SHA and OAuth client ids before wave 2 merge; add explicit error surfacing and rollback checkpoint.
    - scenario: Legacy appUrlOpen hash injection path remains reachable and overrides new auth state transitions.
      likelihood: medium
      impact: high
      mitigation: Remove or gate legacy path, add regression check that no hash injection logs appear in success path.
    - scenario: Session appears only in local storage bridge but not in Firebase current user.
      likelihood: medium
      impact: high
      mitigation: Enforce session truth source as Firebase auth state and fail integration check if drift is detected.
  assumptions:
    - Firebase project and Google provider are already enabled and reachable from Android runtime.
    - Capacitor deep-link and app resume callbacks are functional on target Android versions.
    - Team can run adb logcat and reinstall debug APK for each wave gate.
implementation_specification:
  code_structure: Split auth contracts by runtime boundary; keep web redirect in adapter, introduce Android native provider bridge, and converge app session state on Firebase auth events.
  affected_areas:
    - components/Login.tsx
    - utils/firebase.ts
    - App.tsx
    - utils/oauthDiagnostics.ts
    - android/app/src/main/AndroidManifest.xml
    - capacitor.config.json
    - android/app/build.gradle
  component_details:
    - component: Firebase auth adapter
      responsibility: Expose unified auth interface while routing Android to native provider credential exchange and web to redirect contract.
      interfaces:
        - signInWithOAuth(options)
        - signInWithCredential(googleCredential)
        - onAuthStateChange(callback)
      dependencies:
        - component: firebase/auth SDK
          relationship: provider and session primitives
      integration_points:
        - components/Login.tsx
        - App.tsx
    - component: Login entry flow
      responsibility: Start correct OAuth strategy per runtime and surface deterministic errors.
      interfaces:
        - handleGoogleLogin()
      dependencies:
        - component: Firebase auth adapter
          relationship: calls auth entrypoint
      integration_points:
        - UI login screen
        - diagnostics logs
    - component: App lifecycle auth observer
      responsibility: Process appUrlOpen and resume events without token hash mutation, relying on Firebase session transitions.
      interfaces:
        - appUrlOpen listener
        - appStateChange listener
      dependencies:
        - component: Firebase auth adapter
          relationship: session source of truth
      integration_points:
        - startup bootstrap
        - authenticated view routing
contracts:
  - from_task: T03
    to_task: T05
    interface: AndroidAuthContractV1
    format: "{ provider: 'google', returnMode: 'nativeCredential', errorCodes: string[] }"
  - from_task: T03
    to_task: T06
    interface: WebAuthContractV1
    format: "{ provider: 'google', returnMode: 'redirect', redirectPolicy: 'browserOnly' }"
  - from_task: T05
    to_task: T08
    interface: NativeCredentialResult
    format: "{ idToken: string, accessToken?: string, issuedAt: number }"
  - from_task: T08
    to_task: T10
    interface: SessionStateContract
    format: "{ firebaseCurrentUser: boolean, localSessionMirror: boolean, drift: boolean }"
  - from_task: T10
    to_task: T12
    interface: ReleaseGateEvidence
    format: "{ wave: number, logsPass: boolean, uiPass: boolean, persistencePass: boolean, notes: string }"
