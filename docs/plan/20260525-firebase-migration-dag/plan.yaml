      3. npm install (actualizar deps si algo cambió)
      4. npm run build (verificar compilación)
      5. Verificar que migration scripts están presentes:
         - scripts/migrate-to-firebase.mjs ✓
         - scripts/migrate-party-codes-to-firebase.mjs ✓
         - scripts/audit-remaining-tables.mjs ✓
         - scripts/validate-integrity.mjs ✓
      6. Verificar que firestore.rules está actualizado
