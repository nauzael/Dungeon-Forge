# ============ Contracts (Dependencies between tasks) ============
contracts:
  - from_task: task-1c
    to_task: task-2a
    interface: "Character migration SUCCESS flag + validation report"
    format: |
      {
        "wave_1_complete": true,
        "characters_migrated": number,
        "status": "SUCCESS|FAILED",
        "errors": []
      }
    description: |
      Task 2a (Party Codes) must not START until Task 1c has PASSED validation.
      If Task 1c fails, escalate to Task 1b for retry before proceeding.

  - from_task: task-2c
    to_task: task-3a
    interface: "Party Codes migration SUCCESS flag + audit decision"
    format: |
      {
        "wave_2_complete": true,
        "party_codes_migrated": number,
        "status": "SUCCESS|FAILED|ROLLBACK_APPROVED",
        "ready_for_wave_3": boolean
      }
    description: |
      Task 3a must wait for Task 2c SUCCESS before auditing remaining tables.
      If Task 2c fails with ROLLBACK_APPROVED, Wave 3 is PAUSED until rollback completes.

  - from_task: task-3b
    to_task: task-4a
    interface: "All data migration complete flag + artifact locations"
    format: |
      {
        "wave_3_complete": true,
        "tables_migrated": number,
        "all_migrations_passed": boolean,
        "artifact_paths": {
          "backups": string,
          "logs": string,
          "validation_reports": string
        }
      }
    description: |
      Task 4a (prepare for merge) must wait for Task 3b SUCCESS.
      Task 4a reads artifact locations to ensure all migration data is backed up before git merge.

  - from_task: task-4a
    to_task: task-4b
    interface: "Rebase SUCCESS + clean build"
    format: |
      {
        "rebase_complete": true,
        "conflicts_resolved": true,
        "build_passes": true,
        "sensible_files_excluded": true
      }
    description: |
      Task 4b (merge to main) must not execute until Task 4a confirms rebase is complete
      and build passes. If Task 4a fails, resolve conflicts before retrying Task 4b.

  - from_task: task-4b
    to_task: task-4c
    interface: "Merge SUCCESS + branch confirmation"
    format: |
      {
        "merge_complete": true,
        "branch": "main",
        "commits_merged": number,
        "push_successful": true
      }
    description: |
      Task 4c (validate on main) must execute AFTER Task 4b confirms merge succeeded.
      Task 4c verifies that all artifacts are present in main post-merge.

