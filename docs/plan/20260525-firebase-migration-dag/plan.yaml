    wave_3: 2 tasks (Other tables)
    wave_4: 4 tasks (Merge to main)
  agent_breakdown:
    gem-implementer: 10 tasks (migration, validation, audit, scripting)
    gem-devops: 4 tasks (merge, integration, release)
  estimated_total_effort: "40-60 hours (excluding scripting & testing)"
  critical_path: "task-1a → 1b → 1c → 2a → 2b → 2c → 3a → 3b → 4a → 4b → 4c"
  parallelization: "Wave 1-4 sequential (dependencies block parallelism)"
  rollback_strategy: |
    - WAVE 1 rollback: Restore from backup (scripts/data/backup/characters-*.json)
