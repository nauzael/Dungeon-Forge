  - id: "T2_set_sync_timestamp"
    title: "Set syncTimestamp on characters before setCharacters() in both update handlers"
    description: |
      ROOT CAUSE FIX: handleCharacterUpdate and handleFastUpdate call setCharacters() with a
      fullUpdate that does NOT have syncTimestamp set. This means the character in React state
      has syncTimestamp = undefined. When the Firestore onSnapshot listener fires (subscribeToOwnCharacters,
      App.tsx line 942-979), it compares timestamps:
        const localTime = localChar?.syncTimestamp || 0;  // localTime = 0 since undefined
        if ((char.syncTimestamp || 0) > localTime) { ... } // cloud always wins

      FIX:
      1. In handleCharacterUpdate (line 1009-1011), after building fullUpdate, set
         `fullUpdate.syncTimestamp = Date.now()` BEFORE setCharacters().
      2. In handleFastUpdate (line 1030), after building fullUpdate, set
         `fullUpdate.syncTimestamp = Date.now()` BEFORE setCharacters().

      This ensures the local character always has a recent syncTimestamp, so stale cloud data
      (with older or equal timestamp) won't overwrite the local state. It also ensures that
      when T1 broadcasts `char` from the persist effect, the broadcast data's syncTimestamp
      matches the React state, preventing the loopback.
    wave: 1
    agent: gem-implementer
    status: completed
    covers:
      - "Bug: Missing syncTimestamp in update handlers (root cause #2)"
      - "App.tsx handleCharacterUpdate line 1009-1013"
      - "App.tsx handleFastUpdate line 1030-1032"
    dependencies: []
    conflicts_with: []
    context_files:
