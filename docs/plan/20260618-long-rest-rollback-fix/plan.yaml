  # WAVE 1 — Critical sync fixes (parallel, independent)
  # ───────────────────────────────────────────────────────────────────────
  - id: "T1_move_broadcast_to_persist"
    title: "Move broadcastCharacterUpdate calls from handlers into persist effect"
    description: |
      ROOT CAUSE FIX: The RTDB loopback bug occurs because handleCharacterUpdate and handleFastUpdate
      call broadcastCharacterUpdate() immediately after setCharacters(), before cloud save completes.
      The RTDB broadcast triggers the subscribeWithRetry listener, which calls setCharacters() again,
      triggering the persist effect's cleanup (clearTimeout on the debounced save), canceling the
      Firestore cloud save. Firestore retains stale pre-rest data. On next sync, cloud overwrites local.

      FIX (NO DEDUP NEEDED):
      1. Remove `broadcastCharacterUpdate(fullUpdate.party_id, fullUpdate)` from handleCharacterUpdate
         (App.tsx line 1016-1018) and from handleFastUpdate (App.tsx line 1033-1035).
      2. In the persist effect (App.tsx line 772-830), AFTER the Firestore save loop completes
         (after line 808, inside the try block), add:
         `if (char.party_id) broadcastCharacterUpdate(char.party_id, char);`
         for each dirty character.
      3. IMPORTANT: Use `char` (the original from dirtyChars) NOT `charWithTimestamp`. The original
         `char` already has the syncTimestamp set by T2 (before setCharacters in the handlers).
         Broadcasting `char` means the RTDB data has the same syncTimestamp as React state, so when
         the RTDB listener calls setCharacters(), it won't trigger a meaningful change and the loop
         stops.

      NOTE (DEAD CODE): No isDuplicateEvent check is needed. The `onBroadcast` parameter in
      `subscribeWithRetry` (utils/firebase.ts) is never called by that function — it is dead code.
      The actual RTDB data arrives via `onUpdate` callback (App.tsx lines 528-538). Attempting to
      add dedup to the broadcast handler would have no effect.
    wave: 1
    agent: gem-implementer
    status: completed
    covers:
