# ═══════════════════════════════════════════════════════════════════════════
# PLAN METADATA
# ═══════════════════════════════════════════════════════════════════════════
plan_id: "20260618-long-rest-rollback-fix"
objective: "Fix the Long Rest rollback bug where Firestore cloud data overwrites local changes after a long rest, caused by RTDB loopback canceling the cloud save timeout and missing syncTimestamp. Also fix missing spell slot restoration, destructive Wizard preparedSpells clearing, and missing Arcane Recovery/Warlock pact slot restoration in handleLongRest."
created_at: "2026-06-18"
created_by: "gem-planner"
status: approved
tldr: |
  Root cause: RTDB loopback via handleCharacterUpdate/handleFastUpdate calls broadcastCharacterUpdate
  BEFORE cloud save completes. The RTDB listener fires and calls setCharacters(), triggering the persist
  effect's cleanup (clearTimeout), so Firestore never gets the updated data. Missing syncTimestamp means
  localTime=0 in Firestore listener, so stale cloud always wins. Additionally, handleLongRest in
  RestModal.tsx lacks spell slot restoration for full casters, destructively clears Wizard preparedSpells,
  and misses Arcane Recovery / Warlock pact slot restoration.

  NOTE (DEAD CODE): The `onBroadcast` parameter in `subscribeWithRetry` (utils/firebase.ts) and its
  callback at App.tsx lines 540-546 is DEAD CODE — `subscribeWithRetry` NEVER calls `onBroadcast`.
  The actual RTDB data arrives through the `onUpdate` callback (App.tsx lines 528-538). No dedup guard
  is needed on the broadcast handler. Instead, the fix avoids loopback by broadcasting the original
  character from state (which already has syncTimestamp set by T2) rather than a freshly-timestamped
  clone, so the persist/snapshot effects do not detect a meaningful change and the loop stops.

  Fix:
  - Wave 1 (parallel):
      T1: Remove broadcastCharacterUpdate from handlers, add to persist effect after Firestore save,
          broadcasting `char` (not `charWithTimestamp`) so syncTimestamp matches state and no loopback.
      T2: Set syncTimestamp before setCharacters() in both update handlers.
  - Wave 2:
      T3_4_5: All handleLongRest fixes (spell slots, preparedSpells, Arcane Recovery, Warlock pact slots)
              combined into one task since they modify the same function.
  - Wave 3: Build verification and code review.

