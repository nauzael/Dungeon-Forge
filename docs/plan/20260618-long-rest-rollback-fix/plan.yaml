plan_metrics:
  wave_1_task_count: 2
  total_dependencies: 3
  risk_score: high  # Elevated due to additional rollback causes discovered during implementation
quality_warnings:
  - "RTDB loopback fix changes event ordering: broadcast now happens after Firestore save instead of before. Verify party DM view still receives timely updates."
  - "Spell slot restoration resets usedSlots={} which may conflict with any unsaved slot state."
  - "No test framework; npm run build is the only automated verification gate."
  - "onBroadcast parameter in subscribeWithRetry is dead code; do not attempt to use it for dedup."
additional_fixes_discovered:
  - description: "prev-based merge in handleCharacterUpdate and handleFastUpdate"
    vector: "Both handlers spread from captured `activeCharacter` instead of `c` (live state from `prev`). Under React 18 batching, two rapid setCharacters(fn) calls both start from the same stale base, so the second call UNDOES the first's changes. Fixed by spreading from `c` in the functional updater."
  - description: "RTDB listener timestamp guard in App.tsx and SheetTabs.tsx"
    vector: "Two concurrent RTDB listeners (App.tsx selective path + SheetTabs.tsx all-path) write directly to state with NO timestamp guard. Self-broadcast data arrives with older timestamp and overwrites fresh local state. Fixed by rejecting incoming data with `incomingTime <= currentTime`."
  - description: "charWithTimestamp persistence loop prevention"
    vector: "Persist effect always generated a NEW Date.now() for cloud save, causing Firestore onSnapshot to detect a 'newer' cloud copy and overwrite local state. Fixed by using existing syncTimestamp (already set by handler) instead of generating a fresh one."

