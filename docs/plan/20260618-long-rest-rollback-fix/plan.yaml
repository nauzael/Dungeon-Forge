  - id: "T3_4_5_long_rest_restoration"
    title: "All handleLongRest fixes: spell slots, preparedSpells, Arcane Recovery, Warlock pact slots"
    description: |
      COMBINED TASK: All fixes to handleLongRest in RestModal.tsx, since they all modify the same
      function and should be implemented together to avoid merge conflicts.

      FIX A — Spell slot restoration (was T3):
      handleLongRest (RestModal.tsx line 127-184) restores HP, hit dice, and class resources
      but does NOT restore spell slots. All caster types should have usedSlots reset.

      The Character type tracks used spell slots via:
        usedSlots?: Record<string, boolean>  — individual slot tracking (e.g., "3-0": true)

      In handleLongRest, after existing class-specific resource restoration:
      1. Determine if character has spellcasting capability.
      2. Reset all used spell slots: updated.usedSlots = {}.
      3. This is sufficient because getSpellSlotSummary() computes current = max - used,
         and used = {} means all slots are available.

      FIX B — Wizard preparedSpells (was T4):
      At line 172-175, the current code destructively clears Wizard prepared spells:
        if (charClass === 'Wizard') {
            updated.preparedSpells = [];
        }
      In D&D 5e 2024, Wizards prepare spells after a long rest, but the previous selection
      should be retained as a starting point.

      RECOMMENDED: Remove the destructive assignment and replace with a comment explaining
      that the player's previous prepared spells are preserved as the default next-day selection.

      FIX C — Arcane Recovery + Warlock pact slots (was T5):
      1. Arcane Recovery (Wizard): Reset arcaneRecovery.uses to 1 on long rest.
         Character type defines: arcaneRecovery?: { uses: number }
         Add: if (charClass === 'Wizard') { updated.arcaneRecovery = { uses: 1 }; }

      2. Warlock pact slots: Warlocks get Pact Magic slots back on short rest (already handled
         at line 103-106), but should also be fully restored on long rest.
         Add in handleLongRest:
           if (charClass === 'Warlock') {
               updated.usedSlots = {};
               const pactLevel = updated.pactSlotLevel || 1;
               const pactCount = updated.level >= 17 ? 4 : updated.level >= 11 ? 3 : updated.level >= 2 ? 2 : 1;
               const pactSlots: Record<number, { current: number; max: number }> = {};
               pactSlots[pactLevel] = { current: pactCount, max: pactCount };
               updated.spellSlots = { ...updated.spellSlots, ...pactSlots };
           }
    wave: 2
    agent: gem-implementer
    status: completed
    covers:
