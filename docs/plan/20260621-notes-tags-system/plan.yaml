open_questions:
  - question: "¿TagEditor debe abrirse como bottom sheet (mobile) o popover centrado (desktop)?"
    context: "Se requiere lógica responsive. useResponsive existe en hooks/useResponsive.ts con isMobile"
    type: decision_blocker
    affects: [task-06-tageditor, task-07-integration]
  - question: "¿Los tags creados en el TagEditor son globales (se reúsan entre notas) o locales a la nota?"
    context: "Los tags se guardan dentro de NoteItem.tags[], no hay un registro global. Autocomplete debe extraer tags de otras notas."
    type: research
    affects: [task-02-constants, task-06-tageditor]

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "TagEditor bottom sheet no se renderiza correctamente en iOS Safari (viewport/clip issues)"
      likelihood: medium
      impact: high
      mitigation: "Usar createPortal + fixed inset-0 + z-[300] como patrón existente en atlasViewer. Safe area padding con env(safe-area-inset-bottom)."
    - scenario: "Stale closure en handlers causa pérdida de tags/pin state"
      likelihood: low
      impact: high
      mitigation: "Los 3 handlers (updateNoteField, togglePinNote, saveNoteTags) usan setNotesList(prev => prev.map(...)) — functional updater SIEMPRE. addNote también usa functional updater prev => [...]. NUNCA capturar notesList desde fuera del updater."
    - scenario: "Pin system conflict con el guardado debounced — pin toggle se pierde por el debounce de 800ms"
      likelihood: low
      impact: medium
      mitigation: "Pin toggle llama a setNotesList con spread desde prev, el effect detecta cambio y persiste usando char.syncTimestamp existente."
    - scenario: "Autocompletado de tags en TagEditor lento con muchas notas"
      likelihood: low
      impact: low
      mitigation: "Usar useMemo para computed unique tags, limitar sugerencias a 20."
  assumptions:
    - "Notas existentes sin tags → notes.tags es undefined, tratado como [] en filtros"
    - "Pin máximo 3 notas, controlado por validación en togglePinNote con dialog.showAlert"
    - "Material Symbols Outlined tiene todos los iconos especificados (search, person, priority_high, push_pin, etc.)"
    - "useResponsive está disponible en hooks/useResponsive.ts para determinar mobile vs desktop"
    - "rounded-radius-pill existe en tailwind.config.js o se usa rounded-full como fallback"
    - "dialog.showAlert es accesible como API global o importable (window.confirm o bridge nativo)"

