# ═══════════════════════════════════════════════════════════════════════════
# PLAN: Notes Tab — Tags + Search System (REVISED)
# ═══════════════════════════════════════════════════════════════════════════
plan_id: "20260621-notes-tags-system"
objective: >
  Implementar sistema de tags + búsqueda full-text en NotesTab de Dungeon Forge.
  Agregar NoteTag a types.ts, crear sub-componentes TagChip/SearchBar/TagFilterBar/TagEditor,
  integrar en NotesTab con filtro AND, búsqueda con debounce (desde NotesTab), y pin de notas (máx 3).
created_at: "2026-06-21T12:00:00Z"
created_by: "gem-planner"
status: completed
updated_at: "2026-06-21"
tldr: |
  4 waves, 7 tareas. Wave 1: types + searchbar controlada (sin deps). Wave 2: constants + tagchip + filterbar.
  Wave 3: tageditor con animaciones slide-up/down + prefers-reduced-motion. Wave 4: integración en NotesTab con
  functional updaters obligatorios, handlers separados (updateNoteField, togglePinNote, saveNoteTags),
  matchSearch como función helper pura, pin overflow feedback con dialog.showAlert, y verificación
  de rounded-radius-pill en tailwind.config. Sin cambios a Campaign Atlas ni Alignment/Languages.

# ═══════════════════════════════════════════════════════════════════════════
# PLAN-LEVEL METRICS
# ═══════════════════════════════════════════════════════════════════════════
plan_metrics:
  wave_1_task_count: 2
  total_dependencies: 9
  risk_score: medium

quality_warnings:
  - "TagEditor bottom sheet vs popover: verificar implementación responsive con useResponsive"
  - "Backwards compatibility: notas existentes (sin tags) deben renderizarse sin cambios — tags undefined → empty array"
  - "Pin overflow: mostrar dialog.showAlert('Máximo 3 notas fijadas', 'Límite alcanzado') al intentar pin > 3"
  - "Debounce de persistencia (800ms) debe convivir con debounce de search (300ms en NotesTab) — no interferir"
  - "rounded-radius-pill: VERIFICAR que existe en tailwind.config.js antes de usar en TagChip/TagFilterBar — fallback a rounded-full si no existe"
  - "Animación TagEditor: respetar prefers-reduced-motion — deshabilitar transiciones CSS si el usuario lo tiene activo via @media query"
  - "matchSearch helper: función pura fuera del componente, sin hooks ni closures"
  - "Functional updaters: addNote, updateNoteField, togglePinNote, saveNoteTags — TODOS usan setNotesList(prev => ...), NUNCA capturan notesList en closure"

