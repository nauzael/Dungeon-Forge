  # ─── WAVE 4: Integration ────────────────────────────────────────────
  - id: task-07-integration
    title: "Integrar tags + search + pin en NotesTab"
    description: >
      Refactorizar src/components/sheet/NotesTab.tsx para integrar todos los componentes.
      
      ESTADO NUEVO:
      - rawQuery: string (input del SearchBar, cambia en cada keystroke)
      - searchQuery: string = useDebounce(rawQuery, 300) (valor debounced para filtrar)
      - activeTags: string[] (ids de tags activos en filtro)
      - tagEditorTarget: string | null (id de nota siendo editada, o null)
      
      HELPER — matchSearch (función pura fuera del componente):
      > function matchSearch(note: NoteItem, query: string): boolean
      >   const q = query.toLowerCase();
      >   return note.title.toLowerCase().includes(q)
      >       || note.content.toLowerCase().includes(q)
      >       || (note.tags ?? []).some(tag => tag.label.toLowerCase().includes(q));
      - Función pura: sin hooks, sin closures, sin side effects
      - Definida fuera del componente NotesTab (no necesita re-crearse en cada render)
      
      HANDLERS — TODOS usan functional updater (setNotesList(prev => ...)):
      
      1) addNote:
         setNotesList(prev => [{
           ...createNewNote(),
           tags: [],
           pinned: false,
         }, ...prev])
      
      2) updateNoteField(id, field: 'title' | 'content', value: string):
         setNotesList(prev => prev.map(n =>
           n.id === id ? { ...n, [field]: value } : n
         ))
      
      3) togglePinNote(id):
         setNotesList(prev => {
           const target = prev.find(n => n.id === id);
           if (!target) return prev;
           if (target.pinned) {
             return prev.map(n => n.id === id ? { ...n, pinned: false } : n);
           }
           const pinnedCount = prev.filter(n => n.pinned).length;
           if (pinnedCount >= 3) {
             dialog.showAlert('Máximo 3 notas fijadas', 'Límite alcanzado');
             return prev;
           }
           return prev.map(n => n.id === id ? { ...n, pinned: true } : n);
         })
      
      4) saveNoteTags(id, tags: NoteTag[]):
         setNotesList(prev => prev.map(n =>
           n.id === id ? { ...n, tags } : n
         ))
      
      FILTRADO:
      - filteredNotes usa searchQuery (debounced):
          notesList
            .filter(n => !searchQuery || matchSearch(n, searchQuery))
            .filter(n => activeTags.length === 0 || activeTags.every(tagId => n.tags?.some(t => t.id === tagId)))
      - Pinned notes flotan al inicio dentro del filtrado
      
      HEADER:
      - SearchBar: value=rawQuery, onChange=setRawQuery (SIN debounce interno)
      - TagFilterBar entre header y note list
      
      NOTECARD (sub-componente dentro de NotesTab):
      - Props onUpdate: (id, field: 'title' | 'content', value: string) — solo title y content
      - Pin icon (push_pin) si pinned; al tap → togglePinNote(id)
      - Fila de TagChips entre título y textarea (solo si tiene tags)
      - Botón "+" junto a tags → abre TagEditor para esa nota
      - TagEditor recibe currentTags de la nota target, allUsedTags de todo notesList
      - Al guardar en TagEditor → saveNoteTags(targetId, savedTags)
      
      BACKWARDS COMPAT:
      - Notas sin tags → n.tags ?? [] en filtros y matchSearch
      - Notas legacy (string content) → se migran automáticamente como hasta ahora
      
      VERIFICACIÓN:
      - Confirmar que rounded-radius-pill existe en tailwind.config.js
      - Si no existe, usar rounded-full como fallback en componentes nuevos
      
      NO MODIFICAR:
      - Campaign Atlas section
      - Alignment + Languages cards
      - Debounce persistencia (800ms) existente
