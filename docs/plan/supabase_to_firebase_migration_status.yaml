  - table_name: "telegram_commands"
    status: "NOT MIGRATED ❌"
    migration_script: "NONE (needs to be created)"
    description: "Queue of Telegram commands received from Telegram bot integration"
    schema:
      - field: "id"
        type: "UUID"
      - field: "user_id"
        type: "TEXT"
        notes: "Telegram user ID"
      - field: "message"
        type: "TEXT"
        example: "/help, /list_characters, /roll 1d20+5"
      - field: "status"
        type: "TEXT"
        enum: ["pending", "processing", "completed", "failed"]
        default: "pending"
      - field: "result"
        type: "TEXT (nullable)"
        notes: "Command execution result"
      - field: "error"
        type: "TEXT (nullable)"
        notes: "Error message if failed"
      - field: "created_at"
        type: "TIMESTAMPTZ"
      - field: "updated_at"
        type: "TIMESTAMPTZ"
    indices:
      - "idx_telegram_commands_status_pending"
      - "idx_telegram_commands_user_status"
    rls_enabled: true
    realtime_enabled: true
    dependencies:
      - "allowed_telegram_users (via user_id)"
    code_references:
      - file: "supabase/functions/telegram-bot/index.ts"
        functions:
          - "Queue and process Telegram commands"
    firestore_equivalent: "NONE YET (needs design)"
    estimated_records: "Unknown (ephemeral, typically polled/cleared)"
    risk_level: "low"
    notes: "Optional feature for Telegram bot integration. May not be actively used."

  - table_name: "allowed_telegram_users"
    status: "NOT MIGRATED ❌"
    migration_script: "NONE (needs to be created)"
    description: "Whitelist of authorized Telegram users"
    schema:
      - field: "telegram_id"
        type: "TEXT"
        primary_key: true
        example: "1895932994"
      - field: "username"
        type: "TEXT (nullable)"
        example: "owner"
      - field: "display_name"
        type: "TEXT (nullable)"
      - field: "is_active"
        type: "BOOLEAN"
        default: true
      - field: "created_at"
        type: "TIMESTAMPTZ"
    dependencies:
      - "telegram_sessions (via telegram_id)"
    code_references:
      - file: "supabase/functions/telegram-bot/index.ts"
        usage: "Check if Telegram user is authorized"
    firestore_equivalent: "NONE YET (needs design)"
    estimated_records: "Very small (~1-5 users)"
    risk_level: "low"
    notes: "Optional feature. Only owner user (telegram_id=1895932994) is currently authorized."

  - table_name: "telegram_sessions"
    status: "NOT MIGRATED ❌"
    migration_script: "NONE (needs to be created)"
    description: "Maintains conversation context between Telegram commands"
    schema:
      - field: "telegram_id"
        type: "TEXT"
        primary_key: true
        fk: "allowed_telegram_users.telegram_id"
      - field: "last_command_id"
        type: "UUID (nullable)"
        fk: "telegram_commands.id"
      - field: "context"
        type: "JSONB"
        default: "{}"
        notes: "Stores conversation state (selected character, party, etc)"
      - field: "updated_at"
        type: "TIMESTAMPTZ"
    dependencies:
      - "allowed_telegram_users (via telegram_id)"
      - "telegram_commands (via last_command_id)"
    firestore_equivalent: "NONE YET (needs design)"
    estimated_records: "Very small (~1-5 sessions, ephemeral)"
    risk_level: "low"
    notes: "Ephemeral data. May be safe to discard on migration."

