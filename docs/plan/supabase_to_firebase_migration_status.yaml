# ============================================
supabase_tables:
  - table_name: "characters"
    status: "MIGRATED ✓"
    migration_script: "scripts/migrate-to-firebase.mjs"
    schema:
      - field: "id"
        type: "UUID"
        notes: "Supabase doc ID"
      - field: "user_id"
        type: "TEXT"
        notes: "Supabase auth UID → Firebase UID mapping"
      - field: "data"
        type: "JSONB"
        notes: "Complete character object (name, class, spells, inventory, etc)"
      - field: "party_id"
        type: "UUID (nullable)"
        notes: "FK to parties.id"
      - field: "deleted_at"
        type: "TIMESTAMPTZ (nullable)"
        notes: "Soft-delete timestamp"
      - field: "created_at"
        type: "TIMESTAMPTZ"
      - field: "updated_at"
        type: "TIMESTAMPTZ"
    indices:
      - "idx_characters_user_id"
      - "idx_characters_party_id"
      - "idx_characters_user_party"
    rls_enabled: true
    realtime_enabled: true
    dependencies:
      - "parties (via party_id)"
    code_references:
      - file: "utils/supabase.ts"
        functions:
          - "saveCharacterToCloud()"
          - "fetchCharactersFromCloud()"
          - "softDeleteCharacter()"
          - "subscribeToOwnCharacters()"
    firestore_equivalent:
      - "/characters/{charId}"
      - "/users/{userId}/characters/{charId} (nested, future)"
    migration_record: "Last executed 2026-05-25, unknown record count"

  - table_name: "parties"
    status: "MIGRATED ✓"
    migration_script: "scripts/migrate-parties-to-firebase.mjs"
    schema:
      - field: "id"
        type: "UUID"
        notes: "Supabase doc ID"
      - field: "creator_id"
        type: "TEXT"
        notes: "Supabase auth UID → maps to Firebase UID"
      - field: "name"
        type: "TEXT"
        example: "The Lost Mines of Phandalin"
      - field: "code"
        type: "TEXT"
        notes: "6-char unique party join code (A-Z0-9)"
        example: "XX6AU1"
      - field: "created_at"
        type: "TIMESTAMPTZ"
      - field: "updated_at"
        type: "TIMESTAMPTZ"
    indices:
      - "idx_parties_creator_id"
      - "idx_parties_code"
    rls_enabled: true
    realtime_enabled: true
    dependencies:
      - "characters (via party_id)"
      - "party_resources (via party_id)"
      - "party_codes (separate table for code lookup)"
    code_references:
      - file: "utils/supabase.ts"
        functions:
          - "createParty()"
          - "joinParty()"
          - "updatePartyName()"
          - "deleteParty()"
          - "subscribeToParty()"
      - file: "hooks/useDMParty.ts"
        functions:
          - "usePartySubscription()"
    firestore_equivalent:
      - "/parties/{partyId}"
    migration_record: "Last executed 2026-05-25"
    migration_stats:
      total_parties: 5
      valid_records: 5
      null_issues: 0
      sample_party:
        id: "b2479622-76c7-4b79-a717-36a34e3eba0a"
        name: "Willd"
        code: "XX6AU1"
        creator_id: "8e62b9b0-bfcf-46b9-841b-8d744f1c7f73"
        created_at: "2026-03-25T16:32:37.432Z"

  - table_name: "party_resources"
    status: "NOT MIGRATED ❌"
    migration_script: "NONE (needs to be created)"
    schema:
      - field: "id"
        type: "UUID"
        notes: "Supabase doc ID"
      - field: "party_id"
        type: "UUID"
        notes: "FK to parties.id"
      - field: "title"
        type: "TEXT"
        example: "Phandalin Town Map"
