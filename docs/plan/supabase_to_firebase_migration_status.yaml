        type: "TEXT"
        notes: "Image URL (from Supabase Storage or Cloudflare R2)"
      - field: "thumbnail_url"
        type: "TEXT (nullable)"
        notes: "Compressed thumbnail version"
      - field: "type"
        type: "TEXT"
        enum: ["Setting", "Map", "NPC", "Item", "Plot", "Other"]
        default: "Setting"
      - field: "description"
        type: "TEXT (nullable)"
      - field: "is_persistent"
        type: "BOOLEAN"
        default: true
        notes: "True = stays visible, False = ephemeral broadcast"
      - field: "created_at"
        type: "TIMESTAMPTZ"
      - field: "updated_at"
        type: "TIMESTAMPTZ"
    indices:
