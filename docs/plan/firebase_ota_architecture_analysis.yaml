patterns_found:
  - category: "architecture"
    pattern: "Firebase as primary backend + Firestore ORM"
    description: |
      Firebase replaces Supabase entirely. App exposes Firebase via `supabase` wrapper for compatibility.
      Firestore = document database for characters/parties.
      Realtime DB = pub/sub for live updates.
      Storage = static assets + OTA packages.
    examples:
      - file: "utils/firebase.ts"
        location: "lines 82-127"
        snippet: "export const supabase = { auth: { ... }, from: () => ({ ... }) }"
      - file: "App.tsx"
        location: "line 14-19"
        snippet: "import { supabase, ... } from './utils/firebase'"
    prevalence: "common"

  - category: "error_handling"
    pattern: "Try-catch with try/catch for localStorage and cloud operations"
    description: |
      localStorage.setItem() wrapped in try-catch (debounced 300ms).
      Cloud saves fail gracefully with console.error().
      No user-facing error toasts in critical paths (should add).
    examples:
      - file: "App.tsx"
        location: "line 90-95"
        snippet: |
          try {
            localStorage.setItem('df_session', JSON.stringify({...}));
          } catch (e) {
            console.error("Failed to save session:", e);
          }
      - file: "firebase.ts"
        location: "line 410-415"
        snippet: "catch (e) { console.error('[Sync] Cloud save failed...', e); }"
    prevalence: "common"

  - category: "platform_detection"
    pattern: "Capacitor.getPlatform() branching for web/android/ios"
    description: |
      Platform-specific code paths:
      - web: redirect OAuth, no OTA, CDN delivery
      - android: native Google Sign-In, OTA via CapacitorUpdater, deeplink handling
      - ios: (assumed similar to android, not fully tested)
    examples:
      - file: "firebase.ts"
        location: "lines 206-250"
        snippet: "if (platform === 'android') { ... native plugin ... } else if (platform === 'web') { ... redirect ... }"
      - file: "App.tsx"
        location: "line 138"
        snippet: "if (Capacitor.getPlatform() !== 'web') { CapacitorApp.addListener(...) }"
    prevalence: "common"

  - category: "configuration"
    pattern: "Environment variables for all secrets"
    description: |
      Firebase credentials stored in .env, NOT hardcoded.
      VITE_* prefix for Vite build-time substitution.
      .env.testing for test environment.
      .env.example as template.
    examples:
      - file: ".env"
        location: "lines 3-9"
        snippet: "VITE_FIREBASE_API_KEY=AIzaSy..."
      - file: "utils/firebase.ts"
        location: "line 50"
        snippet: "apiKey: import.meta.env.VITE_FIREBASE_API_KEY || ''"
    prevalence: "common"

related_architecture:
  components_relevant_to_domain:
    - component: "Login.tsx"
      responsibility: "OAuth flow UI component. Handles web redirect, mobile popup, native plugin fallback."
      location: "components/Login.tsx"
      relationship_to_domain: |
        Calls supabase.auth.signInWithOAuth() which routes to Firebase Auth.
        Manages loading/error states during authentication.

    - component: "AuthDebugOverlay.tsx"
      responsibility: "Debug panel for auth configuration validation"
