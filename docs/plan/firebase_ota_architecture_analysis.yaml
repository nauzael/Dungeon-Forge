domain_security_considerations:
  sensitive_areas:
    - area: "Firebase API Key"
      location: ".env:3"
      concern: "Public API key visible in .env. Should be safe (restricted in Firebase Console), but verify CORS policies."

    - area: "Firebase Storage CORS"
      location: "App.tsx:172 (fetch version.json)"
      concern: |
        version.json must be publicly readable from browser.
        If CORS misconfigured: OTA fetch fails silently.
        Verify in Firebase Console → Storage → CORS rules.

    - area: "OAuth Client ID"
      location: "android/app/google-services.json"
      concern: "Client ID extracted at runtime by native plugin. Ensure google-services.json not exposed in build."

    - area: "ID Token Handling"
      location: "firebase.ts:330-350"
      concern: |
        Native plugin returns ID token.
        Token exchanged for Firebase credential immediately.
        Token should not be logged; ensure error logs don't expose it.

    - area: "Session Storage"
      location: "App.tsx localStorage df_session"
      concern: |
        Session stored as JSON in localStorage.
        Should contain user ID + email, not tokens.
        Verify tokens NOT stored in localStorage.

  authentication_patterns_in_domain: |
    WEB PATTERN:
    - signInWithRedirect() → browser navigates to Google → redirects back to deeplink → hash parsed → session established
    
    APK PATTERN:
    - Google Sign-In native plugin → ID token returned → exchanged for Firebase credential via signInWithCredential() → session established
    
    SESSION RETRIEVAL:
    - getSession() returns user object + ID token (from getIdToken())
    - onAuthStateChange() fires on auth state updates
    - Session persisted in localStorage (email + user.id only, not tokens)

  authorization_patterns_in_domain: |
    FIRESTORE RULES:
    - Character read: Only owner (resource.data.user_id == uid)
    - Character write: Only owner, must match user_id constraint
    - Party members: Check via parties/{id}.members[uid]
    
    APPLICATION LEVEL:
    - setUser() / isAuthenticated state in React
    - Local mode bypass (df_local_mode='true' in localStorage)

  data_validation_in_domain: |
    - Character ID type check: isObsoleteSupabaseId() filters UUIDs vs Supabase 36-char format
    - Session parsing: try-catch on JSON.parse(df_session)
    - Version format: semantic version + timestamp (e.g., "1.1.0-2026.5.13-162947")
    - Firebase credential validation: idToken length checked before exchange

