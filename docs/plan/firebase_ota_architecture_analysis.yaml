        Helps troubleshoot auth issues in development.

    - component: "DMDashboard/ConnectionDebugPanel.tsx"
      responsibility: "Runtime connection debugging panel"
      location: "components/DMDashboard/ConnectionDebugPanel.tsx"
      relationship_to_domain: |
        Displays Supabase/Firebase connection status, localStorage state, recent events.
        Shows credential truncation for security.

    - component: "GoogleSignInPlugin (Android native)"
      responsibility: "Native Android Google Sign-In using Google Play Services"
      location: "android/app/src/main/java/com/tupaquete/dndcompanion/GoogleSignInPlugin.java"
      relationship_to_domain: |
        Bridges native Android Google Sign-In to web layer.
        Returns ID token that Firebase Auth exchanges for user session.

  interfaces_used_by_domain:
    - interface: "OTAUpdate"
      location: "types.ts:335-337"
      usage_pattern: |
        Describes structure of OTA update available to user:
        { version: string, message: string, payload: unknown }

    - interface: "VersionJsonResponse"
      location: "types.ts:341-344"
      usage_pattern: |
        Response from version.json fetch:
        { version?: string, url?: string, message?: string }

  data_flow_involving_domain: |
    USER AUTHENTICATION FLOW (Web):
    1. Login.tsx displays login button
    2. User clicks → supabase.auth.signInWithOAuth({provider: 'google'})
    3. firebase.ts redirects to Google OAuth (leaves app)
    4. User grants permission on Google login page
    5. Firebase redirects back to deeplink URL (from intent filter)
    6. App.tsx deeplink handler extracts token from URL hash
    7. Firebase auth state updates, session stored in localStorage

    USER AUTHENTICATION FLOW (APK/Native):
    1. Login.tsx displays login button
    2. User clicks → supabase.auth.signInWithOAuth({provider: 'google'})
    3. Platform detected: android
    4. GoogleSignInPlugin.signInWithGoogle() called
    5. Native Android Google Sign-In UI shown
    6. User grants permission, returns ID token
    7. signInWithGoogleNativeFirebase() exchanges token for Firebase credential
    8. User session established, stored in localStorage

    OTA UPDATE FLOW (APK only):
    1. App starts, calls CapacitorUpdater.notifyAppReady()
    2. checkForUpdates() called
    3. Fetches https://storage.googleapis.com/{bucket}/version.json
    4. Compares version field vs localStorage 'app_version'
    5. If newer: CapacitorUpdater.download({url, version})
    6. Downloads ZIP from Storage
    7. 4-second wait for user interaction
    8. CapacitorUpdater.set({id}) applies update
    9. App restarts with new code

  key_relationships_to_domain:
    - from: "App.tsx (OTA logic)"
      to: "CapacitorUpdater"
      relationship: "calls download(), set(), notifyAppReady()"
    - from: "App.tsx (Auth logic)"
      to: "firebase.ts (supabase wrapper)"
      relationship: "calls supabase.auth.getSession(), onAuthStateChange(), signInWithOAuth()"
    - from: "firebase.ts"
      to: "Firebase Admin SDK (via build_ota.mjs)"
      relationship: "App reads from public Storage; build script writes via Admin SDK"
    - from: "GoogleSignInPlugin (native)"
      to: "firebase.ts signInWithGoogleNativeFirebase()"
      relationship: "Native returns ID token; Web layer exchanges for Firebase credential"

