open_questions:
  - question: "Where is google-services.json supposed to be placed for Android build?"
    context: |
      File currently in docs/google-services.json.
      Android Gradle expects it at android/app/google-services.json.
      If build fails, this is likely cause.
    type: "decision_blocker"
    affects:
      - "Android APK compilation"
      - "Native Google Sign-In availability"
      - "Firebase project configuration in APK"

  - question: "Is Firebase Storage CORS configured to allow browser fetch of version.json?"
    context: |
      App.tsx fetches: https://storage.googleapis.com/{bucket}/version.json
      If CORS not configured, fetch fails and OTA doesn't work.
      CORS rules must allow origin of web/APK.
    type: "decision_blocker"
    affects:
      - "OTA update detection on web/APK"
      - "version.json accessibility"

  - question: "Does the OTA system work for web, or only APK?"
    context: |
      Current code suggests OTA only on APK (CapacitorUpdater only available in native).
