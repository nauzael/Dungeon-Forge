---
plan_id: "firebase-ota-architecture-2026-05-25"
objective: |
  Analyze current Firebase and OTA configuration in Dungeon Forge project.
  Identify integration points, differences between web and APK, and potential breakpoints.
focus_area: "Firebase Cloud Services & OTA Update System"
created_at: "2026-05-25T12:00:00Z"
created_by: "Researcher Agent"
status: "completed"

tldr: |
  Firebase is fully configured with production credentials in .env (Firestore + Auth + Realtime DB + Storage).
  OTA system uses CapacitorUpdater (Capgo) to fetch updates from Firebase Storage; only works on APK, not web.
  Critical issue: google-services.json is in docs/ instead of android/app/ → Android build may fail.
  Auth differs: Web uses redirect flow, APK uses popup + native Google Sign-In plugin.
  OTA script (build_ota.mjs) packages dist/ as ZIP, generates version.json, uploads to Firebase Storage.
  Web and APK diverge at deployment: APK needs CapacitorUpdater, web needs CDN/server hosting.

research_metadata:
  methodology: "Semantic search + grep_search + file content analysis + architecture mapping"
  scope: |
    - Firebase configuration files and initialization
    - OTA update logic in App.tsx and build scripts
    - Capacitor plugins and Android native configuration
    - File structure for web vs APK deployment
    - Environment variables and credential management
  confidence: "high"
  coverage: 92
  decision_blockers: 1
  research_blockers: 0

