domain_security_considerations:
  sensitive_areas:
    - area: "removeFromParty visibility"
      location: "supabase.ts:419-460"
      concern: |
        No hay auth check que caller es DM.
        RLS policy debería prevenir, pero fallback a kickLocal sin validar.
        Si RLS falla, cualquiera podría ejecutar removeFromParty.

    - area: "broadcast permissions"
      location: "supabase.ts:514, App.tsx"
      concern: |
        Cualquier player puede enviar broadcast a cualquier party.
        Sin firma/auth en broadcast payload.
        Could lead to data injection si broadcast no validado.

  authentication_patterns_in_domain: |
    - removeFromParty: Relies on RLS (user_id implicit via creator_id)
    - broadcastCharacterUpdate: No auth on broadcast (ephemeral)
    - subscribeToParty: No auth validation, assumes party_id is public

  authorization_patterns_in_domain: |
    - DM Dashboard: Only creator_id can see members (RLS enforced)
    - Player broadcast: No restriction on who broadcasts what
    - Kick: No explicit auth (RLS enforces at DB level)

