## RESPUESTAS A LAS 5 PREGUNTAS

### 1. ¿Por qué subscribeWithRetry() está fallando en realtime?

**ROOT CAUSE**: Timeout de 5 segundos muy agresivo + sin validación de filter.

**EVIDENCIA**:
- `subscribeWithRetry()` en supabase.ts línea 327: `const TIMEOUT_MS = 5000`
- Bajo carga o latencia >5s, timeout se dispara
- Sin validación que `party_id=eq.${partyId}` está bien formado
- Si partyId es null/undefined, filter es `party_id=eq.undefined` ← falla silenciosamente
- Exponential backoff: 1s→2s→4s→8s×6 = ~65 segundos total

**RESULTADO**: DM ve "connecting" por 60-90 segundos, luego "error"

### 2. ¿Está el UPDATE de removeFromParty llegando a Supabase correctamente?

**ROOT CAUSE**: UPDATE es ASYNC sin confirmación. Si usuario reload durante los 100-500ms, fetchMembers carga data vieja.

**EVIDENCIA**:
- `removeFromParty()` en supabase.ts línea 419-435: UPDATE sin `.single()` para confirmar
- `handleKickCharacter()` en useDMParty.ts línea 166-180: `await removeFromParty()` pero luego `setIsRemoving(null)` inmediatamente
- Sin esperar a que UPDATE complete en row.party_id
- `fetchMembers()` ejecuta SELECT ANTES de que UPDATE complete → retorna data vieja
- VENTANA DE RIESGO: 100-500ms entre UPDATE async y confirmación

**RESULTADO**: Character "kicked" reaparece después de reload

### 3. ¿Hay un problema de RLS que está bloqueando las operaciones?

**ROOT CAUSE**: RLS violations se cachean pero fallback es incompleto.

**EVIDENCIA**:
- `removeFromParty()` línea 450-460: Si RLS bloquea (code 42501), cae a `kickLocal()`
- `kickLocal()` en localStorage.ts: SOLO registra localmente, NO actualiza broadcast
- Character sigue siendo sincronizado por otros clientes aunque "kicked"
- Sin logging claro que fallback fue usado

**RESULTADO**: Si RLS falla, character se piensa kicked pero permanece visible a otros

### 4. ¿Hay caché de localStorage que interfiere con el estado correcto?

**ROOT CAUSE**: localStorage fallback existe pero está incompleto. El problema principal es DB query, no localStorage.

**EVIDENCIA**:
- `localStorage.ts` crea parties pero NO maneja character membership
- RLS fallback a `kickLocal()` solo logea localmente
- Problem principal está en `fetchMembers()` SELECT: **NO FILTRA deleted_at IS NULL**
- Characters soft-deleted con party_id aún asignado se cargan igual

**RESULTADO**: localStorage NO es el culpable primario. El culpable es fetchMembers sin deleted_at filter.

### 5. ¿El problema empezó DESPUÉS del OTA de ghost players o existía antes?

**ROOT CAUSE**: Problemas son ANTERIORES al OTA. El OTA cerró 90% pero dejó 10% sin cerrar.

**EVIDENCIA**:
- OTA implementó defensas en realtime handlers (postgres_changes + broadcast)
- ✅ CERRADO: Ghost RE-INSERCIÓN vía realtime broadcast
- ❌ SIN CERRAR: Ghost RECARGA INICIAL en reload (fetchMembers sin deleted_at filter)
- ❌ SIN CERRAR: Timeout de 5s agresivo en subscribeWithRetry (existía antes, no mejorado)

**RESULTADO**: 
- Problem 1 (connecting): Existía antes, sin cambios en OTA
- Problem 2 (ghost reload): 50% cerrado por OTA, 50% pendiente (fetchMembers query)

