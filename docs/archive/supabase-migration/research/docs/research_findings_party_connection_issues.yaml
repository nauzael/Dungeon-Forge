          El OTA cerró 90% del problema (realtime race conditions)
          Pero 10% permanece: removeFromParty async timing + fetchMembers sin deleted_at filter
        language: yaml

patterns_found:
  - category: "architecture"
    pattern: "Async operation without confirmation + Immediate read"
    description: |
      removeFromParty() es ASYNC pero handleKickCharacter() no espera confirmación.
      Si cliente hace reload ANTES de que UPDATE complete (~100-500ms):
      - fetchMembers() ejecuta SELECT
      - UPDATE aún está en flight
      - SELECT retorna data VIEJA
      - setMembers reinseerta character
      
      AFECTA: Kick flow, character visibility
      PREVALENCIA: common (cualquier reload rápido gatilla esto)
    examples:
      - file: "useDMParty.ts"
        location: "166-180 (handleKickCharacter)"
        snippet: |
          const success = await removeFromParty(id);
          unstable_batchedUpdates(() => {
            if (success) {
              setMembers(prev => prev.filter(c => c.id !== id));  // ← Optimistic UI
            }
          });
          // No espera a que UPDATE en Supabase complete
          // Si reload ocurre ahora, fetchMembers carga data vieja
    prevalence: common

  - category: "database"
    pattern: "Missing critical WHERE clause in SELECT"
    description: |
      fetchMembers SELECT data WHERE party_id = $1 
      pero NO FILTRA: AND deleted_at IS NULL
      
      Characters soft-deleted aún tienen party_id asignado.
      Sin filtro deleted_at, se cargan como si fueran válidos.
    examples:
      - file: "useDMParty.ts"
        location: "97-117 (fetchMembers)"
        snippet: |
          const { data } = await supabase
            .from('characters')
            .select('data')
            .eq('party_id', partyId);
            // Missing: .is('deleted_at', null)
    prevalence: occasional

  - category: "timing"
    pattern: "Aggressive timeout with high retry count"
    description: |
      subscribeWithRetry() con 5s timeout muy agresivo.
      Bajo carga de red o latencia >5s, genera 10 reintentos = 60-90s delay.
      DM panel muestra "connecting" por MUCHO tiempo.
    examples:
      - file: "supabase.ts"
        location: "320-370 (subscribeWithRetry parameters)"
        snippet: |
          const TIMEOUT_MS = 5000;
          const MAX_RETRIES = 10;
          // 5s timeout puede ser insuficiente bajo carga
          // Backoff: 1s, 2s, 4s, 8s, 8s... = hasta 65s total
    prevalence: occasional

  - category: "error-handling"
    pattern: "RLS fallback is incomplete"
    description: |
      removeFromParty() fallback a kickLocal() cuando RLS bloquea.
      Pero kickLocal() solo registra localmente.
      No actualiza state realtime, causando inconsistencias.
    examples:
      - file: "supabase.ts"
        location: "450-460 (RLS fallback)"
        snippet: |
          if (isRlsError) {
            console.warn('[RLS] removeFromParty blocked...');
            return await kickLocal('unknown-party', characterId);
            // kickLocal() NO remueve del broadcast realtime
          }
    prevalence: rare

related_architecture:
  components_relevant_to_domain:
    - component: "DMDashboard.tsx"
      responsibility: "UI principal del DM, muestra parties y miembros"
      location: "components/DMDashboard.tsx:116 líneas (refactored)"
      relationship_to_domain: |
        Consume useDMParty hook. Si realtimeStatus = "connecting", muestra spinner.
        Si party.members tiene ghosts, muestra miembros incorrectos.

    - component: "MemberCard.tsx"
      responsibility: "Card individual para cada miembro"
      location: "components/MemberCard.tsx (memoized)"
      relationship_to_domain: |
        Renderiza cada character en setMembers array.
        Si array contiene ghosts, MemberCard los renderiza.

    - component: "JoinPartyModal.tsx"
      responsibility: "Modal para join/leave party (player side)"
      location: "components/JoinPartyModal.tsx"
      relationship_to_domain: |
        Player ejecuta removeFromParty() cuando deja party.
        Si UPDATE falla silenciosamente, player se piensa que dejó pero DM aún lo ve.

  interfaces_used_by_domain:
    - interface: "Character"
      location: "types.ts"
      usage_pattern: |
        party_id: string | null (stored en Character.party_id Y en row.party_id)
        deleted_at?: string | null (stored en row, no siempre en Character.data)
        syncTimestamp?: number (added por removeFromParty)

    - interface: "RealtimeSubscription"
      location: "supabase.ts:316-320"
      usage_pattern: |
        return { channel, unsubscribe(), status }
        Status es: 'connecting' | 'connected' | 'error' | 'reconnecting'

  data_flow_involving_domain: |
    NORMAL FLOW:
    DM selects party
      → selectParty(partyId)
      → debouncedFetchMembers(partyId) (300ms debounce)
      → fetchMembers() SELECT from Supabase
      → setMembers(loaded)
      → useEffect triggers subscribeWithRetry()
      → postgres_changes + broadcast listeners active
    
    KICK FLOW (WITH RACE CONDITION):
    User clicks KICK
      → handleKickCharacter(id, name)
      → setIsRemoving(id)
      → setMembers(filtered) ← OPTIMISTIC, SÍNCRONO
      → removeFromParty(id) → UPDATE async en Supabase
      → setIsRemoving(null)
    
    IF USER RELOADS DURING KICK:
      → Cleanup + new selectParty()
      → debouncedFetchMembers(300ms)
      → fetchMembers() EXECUTES (UPDATE aún en flight)
      → fetchMembers() retorna CHARACTER VIEJO (con party_id aún asignado)
      → setMembers(loaded) REINSEERTA EL CHARACTER
      → CHARACTER REAPARECE
    
    REALTIME RACE (BROADCAST ANTES QUE POSTGRES_CHANGES):
    broadcast message llega → deduplicateAndMerge → reinserta si syncTimestamp > existing
    postgres_changes event llega 100ms después → filtra character

  key_relationships_to_domain:
    - from: "useDMParty hook"
      to: "Supabase removeFromParty()"
      relationship: "calls (async, without await confirmation)"
    
    - from: "handleKickCharacter"
      to: "setMembers"
      relationship: "calls (optimistic update, no confirmation from DB)"
    
    - from: "fetchMembers"
      to: "SELECT characters query"
      relationship: "executes (missing deleted_at filter)"
    
    - from: "subscribeWithRetry"
      to: "postgres_changes listener"
      relationship: "depends on (5s timeout may fail under load)"
    
    - from: "broadcast handler"
      to: "deduplicateAndMerge"
      relationship: "calls (defensa del OTA, pero insuficiente)"

