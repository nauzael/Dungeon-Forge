## RESUMEN EJECUTIVO

**PROBLEMA 1: Panel de party en "connecting"**
- SEVERIDAD: Alta
- ROOT CAUSE: subscribeWithRetry timeout 5s + sin filter validation
- UBICACIÓN: supabase.ts:327, línea timeout 5000ms
- IMPACTO: DM panel inutilizable por 60-90 segundos
- SOLUCIÓN REQUERIDA: Aumentar timeout a 10-15s, validar filter, agregar exponential jitter mejorado

**PROBLEMA 2: Personaje eliminado reaparece después de reload**
- SEVERIDAD: Alta
- ROOT CAUSE PRIMARIA: fetchMembers SELECT SIN deleted_at IS NULL filter
- ROOT CAUSE SECUNDARIA: removeFromParty UPDATE async sin confirmación
- UBICACIÓN: useDMParty.ts:107 (SELECT query), supabase.ts:419 (async UPDATE)
- IMPACTO: Characters "kicked" reaparecen después de reload
- SOLUCIÓN REQUERIDA: 
  1. Agregar AND deleted_at IS NULL a fetchMembers
  2. Esperar confirmación UPDATE antes de permitir reload
  3. Filtrar broadcast messages que tengan deleted_at

**OTA GHOST FIX: 90% Efectivo**
- ✅ CERRADO: Re-inserción vía broadcast
- ❌ PENDIENTE: Recarga inicial en reload
- ACCIÓN: Agregar missing deleted_at filter a fetchMembers

