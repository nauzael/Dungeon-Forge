  - question: "¿El filter de postgres_changes está siendo validado antes de subscribe?"
    context: |
      subscribeWithRetry() construye filter como: `party_id=eq.${partyId}`
      Si partyId es null, undefined, o contiene caracteres inválidos:
      Filter podría ser: `party_id=eq.undefined` o `party_id=eq.null`
      Sin validación, filter silenciosamente falla
    type: decision_blocker
    affects: ["Problem 1: Connecting", "Realtime reliability"]

  - question: "¿Cuál es la latencia promedio de Supabase UPDATE en producción?"
    context: |
      Problema 2 asume UPDATE toma 100-500ms.
      Pero si UPDATE toma 1-2s bajo carga, race condition es más probable.
    type: research
    affects: ["Problem 2: Ghost reload", "Timing analysis"]

  - question: "¿Hay RLS policy bloqueando removeFromParty silenciosamente?"
    context: |
      Si RLS bloquea UPDATE pero removeFromParty no logea error claramente,
      fallback a kickLocal sería invisibles y daría false success.
    type: decision_blocker
    affects: ["Problem 2: Ghost reload", "RLS reliability"]

  - question: "¿Por qué fetchMembers SELECT usa solo 'data' y no incluye party_id del row?"
    context: |
      Si selectamos party_id como columna separada, podríamos validar
      que el row.party_id coincida con el esperado ANTES de usar Character.
      Esto daría una capa de validación adicional.
    type: nice_to_know
    affects: ["Problem 2: Data integrity"]

  - question: "¿El debounce 300ms es suficiente para fetchMembers después de kick?"
    context: |
      Si UPDATE toma 500ms+ y debounce es 300ms, race condition es garantizada.
      ¿Debería debounce ser dinámico basado en UPDATE latency?
    type: decision_blocker
    affects: ["Problem 2: Timing", "UX responsiveness"]

gaps:
  - area: "removeFromParty confirmation"
    description: |
      removeFromParty() es async pero handleKickCharacter no espera
      confirmación de que UPDATE completó en Supabase.
      No hay check que UPDATE fue exitosa en row.party_id antes de
      permitir reload/navigate.
    impact: decision_blocker
    affects: ["Problem 2: Ghost reload", "Data consistency"]

  - area: "fetchMembers missing filters"
    description: |
      SELECT data WHERE party_id = $1
      Debería ser: SELECT data WHERE party_id = $1 AND deleted_at IS NULL
      Sin este filtro, characters soft-deleted se cargan como válidos.
    impact: decision_blocker
    affects: ["Problem 2: Ghost reload", "Data integrity"]

  - area: "subscribeWithRetry timeout validation"
    description: |
      5000ms timeout es hardcoded sin validación de si filter está bien formado.
      Si filter es inválido (e.g., party_id=eq.undefined), timeout se dispara
      sin posibilidad de conectar nunca.
    impact: decision_blocker
    affects: ["Problem 1: Connecting", "Realtime reliability"]

  - area: "RLS fallback incomplete"
    description: |
      removeFromParty() fallback a kickLocal cuando RLS bloquea.
      Pero kickLocal() no actualiza realtime broadcast.
      No hay logging claro que fallback fue usado.
    impact: decision_blocker
    affects: ["Problem 2: Ghost reload under RLS", "Error visibility"]

  - area: "Race condition documentation"
    description: |
      handleKickCharacter optimistic update pero sin documentación
      que fetchMembers puede recargar viejo character si UPDATE está en flight.
      No hay tests para este escenario específico.
    impact: research_blocker
    affects: ["Problem 2", "Code maintainability"]

  - area: "Broadcast ordering guarantees"
    description: |
      Si broadcast llega antes que postgres_changes, ghost puede reinsertar
      debido a timestamp comparison en deduplicateAndMerge().
      No hay garantía de ordering entre channels en Supabase Realtime.
    impact: research_blocker
    affects: ["Problem 2", "Realtime reliability"]

