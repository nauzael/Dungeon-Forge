related_conventions:
  naming_patterns_in_domain: |
    - Listeners: subscribeWithRetry, subscribeToOwnCharacters, subscribeToPartyResources
    - Handlers: handleCharacterUpdate, handleDMCharacterUpdate, applyHpChange
    - Effects: useEffect[isAuthenticated, user], useEffect[characters, isAuthenticated, user]
    - State: characters, activeCharacter, isSyncing, syncMessage

  structure_of_domain: |
    App.tsx (state orchestrator)
    ├── useEffect[auth] → verify session, setup listeners
    ├── useEffect[characters] → 300ms debounce → save to localStorage + Supabase
    ├── useEffect[subscribeToOwnCharacters] → listen for cloud changes
    ├── useEffect[subscribeWithRetry observer] → listen for observed char
    └── handlers → handleCharacterUpdate → broadcast + state
    
    CombatTab.tsx (component)
    ├── applyHpChange() → onUpdate() immediately
    └── Other resources (focus, bardic, etc) → onUpdate() immediately

  error_handling_in_domain: |
    - localStorage.setItem() wrapped in try/catch
    - saveCharacterToCloud() catches errors, logs console.error(), returns null
    - subscribeWithRetry() has timeout (15s) + exponential backoff (2^attempt * 1000ms)
    - No user-facing error toast for failed cloud saves
    - No automatic retry queue for failed saves

  testing_in_domain: "No tests exist (per project conventions)"

  documentation_in_domain: |
    - Console logs: [Sync], [Realtime], [Observer], [DM], [Broadcast]
    - Comments: sparse on sync strategy
    - No architecture document for sync flow

