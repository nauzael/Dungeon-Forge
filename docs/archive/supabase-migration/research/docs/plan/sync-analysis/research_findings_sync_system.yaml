patterns_found:
  - category: "synchronization"
    pattern: "Synchronization on Login (Merge Strategy)"
    description: "App.tsx fetches cloud chars on auth, compares timestamps with local, merges, uploads pending. Strategy: cloudTime > localTime → use cloud, else → upload local"
    examples:
      - file: "App.tsx"
        location: "237-320"
        snippet: "if (cloudTime > localTime) { merged[localIndex] = cloudChar } else if (localTime > cloudTime) { pendingUploads.push(localChar) }"
    prevalence: "occasional"

  - category: "performance"
    pattern: "Debounce Gap Between State Change & Persistence"
    description: "CombatTab.applyHpChange() calls onUpdate() immediately (0ms), but localStorage/cloud persistence uses 300ms debounce. Gap allows UI to show stale data if component re-renders before save fires"
    examples:
      - file: "components/sheet/CombatTab.tsx"
        location: "413-438"
        snippet: "onUpdate({ ...character, hp: { ...character.hp, current: newCurrent, temp: newTemp } }); // No debounce"
      - file: "App.tsx"
        location: "508-535"
        snippet: "const saveData = setTimeout(async () => { ... }, 300);"
    prevalence: "common"

  - category: "error_handling"
    pattern: "Silent Failure on Cloud Save"
    description: "saveCharacterToCloud() catches errors and logs to console, but no user feedback, no retry queue, no rollback. If cloud fails, local state keeps the new value"
    examples:
      - file: "utils/supabase.ts"
        location: "34-56"
        snippet: "catch (e) { console.error('[Sync] Cloud save failed...'); return null; }"
    prevalence: "common"

  - category: "architecture"
    pattern: "Multiple Listeners Without Deduplication"
    description: "Same character can trigger updates via: (1) postgres_changes, (2) broadcast, (3) subscribeToOwnCharacters. No deduplication - can cause 2-3 setState calls in rapid succession"
    examples:
      - file: "App.tsx"
        location: "591-614, 618-645"
        snippet: "subscribeWithRetry() + subscribeToOwnCharacters() both listening on same character_id"
    prevalence: "common"

  - category: "batching"
    pattern: "No Batching of Changes"
    description: "Each field change = separate onUpdate() call. In App.tsx, cloud save iterates over ALL characters and calls saveCharacterToCloud() for each one sequentially, no batch endpoint"
    examples:
      - file: "App.tsx"
        location: "520-525"
        snippet: "for (const char of characters) { await saveCharacterToCloud(charWithTimestamp, user.id); }"
      - file: "components/sheet/CombatTab.tsx"
        location: "242, 266, 279..."
        snippet: "Multiple onUpdate() calls for different resources: focus, bardic, channel divinity, etc."
    prevalence: "common"

  - category: "validation"
    pattern: "Validation After Save, Not Before"
    description: "CombatTab calculates new values and calls onUpdate() immediately. No pre-validation. If calculation has NaN, it persists to cloud and localStorage"
    examples:
      - file: "components/sheet/CombatTab.tsx"
        location: "413-438"
        snippet: "const amount = parseInt(hpAmount); if (isNaN(amount)) { close modal } else { onUpdate(...) }"
    prevalence: "occasional"

  - category: "architecture"
    pattern: "LocalStorage Source of Truth Unclear"
    description: "App.tsx loads from localStorage on startup, but cloud fetch happens AFTER. If cloud has newer data, merge happens but localStorage isn't updated until NEXT persist call (300ms debounce)"
    examples:
      - file: "App.tsx"
        location: "217-235, 237-320"
        snippet: "Initial load from localStorage, then async syncFromCloud(), then setTimeout for persist"
    prevalence: "occasional"

