    - component: "CombatTab.tsx"
      responsibility: "Combat mechanics UI - HP, armor, resources, weapons"
      location: "components/sheet/CombatTab.tsx:1-1800"
      relationship_to_domain: "Critical path for HP changes - fires onUpdate immediately on damage/heal"
    
    - component: "utils/supabase.ts"
      responsibility: "Supabase client wrapper - save/load/subscribe functions"
      location: "utils/supabase.ts:1-700"
      relationship_to_domain: "Cloud persistence layer - handles realtime listeners"
  
  interfaces_used_by_domain:
    - interface: "Character"
      location: "types.ts"
      usage_pattern: "Main data model - passed through every update cycle"
    
    - interface: "SheetTabsProps"
      location: "components/SheetTabs.tsx:29"
      usage_pattern: "onUpdate: (update: Character | Partial<Character>) => void"
    
    - interface: "CombatTabProps"
      location: "components/sheet/CombatTab.tsx:48"
      usage_pattern: "onUpdate: (update: Partial<Character>) => void"

  data_flow_involving_domain: |
    1. User action in CombatTab (click damage button)
    2. applyHpChange() calculates new HP
    3. onUpdate(partialChar) called IMMEDIATELY
    4. SheetTabs receives update → calls App.tsx handleCharacterUpdate()
    5. setCharacters() triggers useEffect[characters]
    6. setTimeout 300ms debounce fires
    7. localStorage.setItem() + saveCharacterToCloud() for ALL characters
    8. Meanwhile: subscribeWithRetry listens for postgres_changes from cloud
    9. If another user edited: conflict resolved by timestamp comparison
    10. If cloud save fails: local state unchanged, console error logged only

  key_relationships_to_domain:
    - from: "CombatTab.applyHpChange()"
      to: "App.handleCharacterUpdate()"
      relationship: "calls onUpdate → merges state → triggers persist"
    
    - from: "App.useEffect[characters]"
      to: "saveCharacterToCloud()"
      relationship: "debounce wrapper → iterates characters"
    
    - from: "subscribeWithRetry()"
      to: "setCharacters()"
      relationship: "realtime listener → updates local state"
    
    - from: "localStorage"
      to: "Supabase"
      relationship: "fallback source → cloud is authoritative"

