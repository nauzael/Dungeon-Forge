  mock_patterns: []

open_questions:
  - question: "Is broadcast channel used for real-time updates in production or only for manual testing?"
    context: "subscribeWithRetry() listens for 'broadcast' event with character-update, but broadcastCharacterUpdate() is called after handleCharacterUpdate(). Seems like dual mechanism (postgres_changes + broadcast)"
    type: "decision_blocker"
    affects: ["broadcast listener overhead", "duplicate updates from two sources"]
  
  - question: "Why does saveCharacterToCloud iterate over ALL characters instead of just the updated one?"
    context: "App.tsx:520-525 saves every character in the array, not just the one that changed"
    type: "research"
    affects: ["performance", "network usage"]
  
  - question: "Should CombatTab changes be debounced at component level or only at App level?"
    context: "Currently: no debounce at CombatTab → 300ms debounce at App → potential gaps"
    type: "decision_blocker"
    affects: ["data consistency", "perceived responsiveness"]
  
  - question: "Is the conflict resolution (timestamp-based last-write-wins) documented or intentional?"
    context: "No comments explaining the choice over OT or CRDT"
    type: "nice_to_know"
    affects: ["team awareness", "future maintenance"]
  
  - question: "Does Capacitor app need special handling for Auth state changes from popup vs main context?"
    context: "Code has fallback polling for localStorage at 500ms intervals (lines 190-220) due to popup context issue"
    type: "nice_to_know"
    affects: ["mobile auth reliability"]

gaps:
  - area: "Debouncing Strategy at Component Level"
    description: "CombatTab and other tabs fire onUpdate() immediately. No debounce at component level. Only App.tsx has 300ms debounce. Creates gap where state changes fast but persistence lags"
    impact: "decision_blocker"
    affects: ["HP changes not persisted if component unmounts within 300ms", "re-renders trigger before save completes"]

  - area: "Error Recovery & Rollback"
    description: "No rollback if saveCharacterToCloud fails. No retry queue. No user feedback. Silent failure mode"
    impact: "decision_blocker"
    affects: ["data loss risk", "user trust", "observability"]

  - area: "Listener Deduplication"
    description: "App.tsx subscribes to character updates via subscribeWithRetry + subscribeToOwnCharacters simultaneously. Same character can trigger setState 2-3 times in rapid succession with no deduplication"
    impact: "research_blocker"
    affects: ["performance", "re-render count"]

  - area: "Conflict Resolution Documentation"
    description: "Timestamp-based merge strategy is in code but not documented. Vulnerable to clock skew. No mention of edge cases (e.g., equal timestamps, offline merge)"
    impact: "research_blocker"
    affects: ["team understanding", "future maintenance"]

  - area: "Batch Save Optimization"
    description: "Cloud save iterates characters instead of using batch endpoint. Each save is separate upsert call"
    impact: "nice_to_know"
    affects: ["network efficiency", "throughput"]

  - area: "localStorage Validation"
    description: "localStorage loaded on startup but no schema validation. If corrupted data exists, will propagate to cloud on next save"
    impact: "research_blocker"
    affects: ["data corruption scenarios", "recovery procedures"]

  - area: "Real-time Listener Cleanup"
    description: "subscribeWithRetry returns unsubscribe function, but no guarantee it's called. useEffect cleanup in App.tsx should cover it, but verify"
    impact: "nice_to_know"
    affects: ["resource leaks", "connection management"]

  - area: "User Feedback for Sync Status"
    description: "UI shows 'Sincronizando...' and 'Sincronizado' but no distinction between pending, saving, failed states. No toast for errors"
    impact: "decision_blocker"
    affects: ["user confidence", "troubleshooting difficulty"]
