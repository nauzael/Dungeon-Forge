domain_security_considerations:
  sensitive_areas:
    - area: "Cloud Save Failure"
      location: "utils/supabase.ts:34-56"
      concern: "If saveCharacterToCloud fails, local state keeps new value with no rollback. User sees 'Guardado' UI but cloud is stale"
    
    - area: "Realtime Listener Race Conditions"
      location: "App.tsx:591-645"
      concern: "If user edits local + cloud broadcasts simultaneously, last-write-wins based on timestamp. Can lose data if timestamps are equal or clock-skewed"
    
    - area: "Silent Error Logging"
      location: "utils/supabase.ts:52, App.tsx:531"
      concern: "Errors logged to console only. Users unaware if their saves failed"

  authentication_patterns_in_domain: |
    - Firebase Auth (popup flow) stored in localStorage as 'df_session'
    - df_session contains: { user: email, id: userId }
    - Fallback: polling localStorage every 500ms if auth listener doesn't fire (handles popup context issue)

  authorization_patterns_in_domain: |
    - Supabase RLS policies: user_id column matches logged-in user
    - Fallback to localStorage if RLS blocks (e.g., createPartyLocal)
    - DM Dashboard: can view party characters (READ) but onUpdate goes through saveCharacterToCloud (uses owner's user_id)

  data_validation_in_domain: |
    - CombatTab: parseInt(hpAmount), isNaN check, but proceeds if valid
    - No schema validation before cloud save
    - Timestamp comparison for conflict detection, but vulnerable to clock skew
    - Character.syncTimestamp added locally before upload

