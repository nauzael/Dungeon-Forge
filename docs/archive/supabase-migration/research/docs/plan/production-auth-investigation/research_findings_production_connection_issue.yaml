related_conventions:
  naming_patterns_in_domain: |
    - VITE_* prefix: Environment variables (Vite convention)
    - df_* prefix: localStorage keys (df = "dungeon forge")
    - handleX(): Event handlers (handleGoogleLogin, handleLocalModeClick)
    - [Auth], [Login], [OAuth], [LocalMode]: Console log prefixes
    - isMockMode, isNative, isAuthenticated: Boolean flags

  structure_of_domain: |
    Authentication layer flows:
    1. Startup: Check local mode first, else Supabase session
    2. Login: Detect capabilities via isMockMode, show appropriate UI
    3. OAuth: Capacitor deeplink handler processes callback
    4. OTA: CheckForUpdates happens in background

  error_handling_in_domain: |
    - Missing env vars: Graceful fallback to localStorage
    - OAuth failure: Alerts user with error message
    - Browser open failure: Logs error, disables loading
    - Network timeouts: 15s timeout on Supabase operations
    - Deeplink parsing: Validates tokens before reload

  testing_in_domain: |
    - scripts/validate-oauth.js: Validates OAuth configuration
    - scripts/test-oauth-fix.mjs: Simulates OAuth timing
    - OAuthDebugConsole.tsx: Runtime diagnostics tool

  documentation_in_domain: |
    - .env.example: Template para env vars
    - README.md: Environment variables section
    - CHANGELOG.md: OAuth timing fix documented
    - Various .md docs: OAuth flow explained

