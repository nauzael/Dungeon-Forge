domain_security_considerations:
  sensitive_areas:
    - area: "Environment variable exposure"
      location: "import.meta.env.VITE_* hardcoded in transpiled code"
      concern: |
        VITE_SUPABASE_ANON_KEY is PUBLIC but should still be secured
        - Transpiled code is sent to APK/iOS
        - Key is visible in network traffic (HTTPS mitigates)
        - Key is accessible to iOS/Android processes

    - area: "Deeplink validation"
      location: "App.tsx OAuth callback handler"
      concern: |
        App accepts ANY deeplink with tokens
        Should validate:
        - URL scheme matches registered deeplink
        - Tokens are properly formatted
        - No MITM injection of fake tokens

    - area: "localStorage persistence"
      location: "df_session, df_local_mode keys"
      concern: |
        Sensitive session data stored in localStorage
        On mobile, accessible to other apps if not sandboxed
        Should use Capacitor SecureStorage instead

  authentication_patterns_in_domain: |
    - OAuth 2.0 with Google (Supabase provider)
    - Session stored in Supabase auth state
    - localStorage fallback for persistence
    - Deeplink callback for mobile OAuth redirect

  authorization_patterns_in_domain: |
    - Supabase RLS (Row Level Security) policies
    - User ID comparison in queries
    - localStorage operations assume single user per device

  data_validation_in_domain: |
    - OAuth URL token extraction (access_token, refresh_token search)
    - Deeplink URL parsing (split by # or ?)
    - Email validation in session (session.user.email check)

open_questions:
  - question: "Was VITE_SUPABASE_URL correctly set in .env during the last `npm run build` before APK deployment?"
    context: |
      This is the CRITICAL question.
      If .env was missing or had empty values during build,
      the transpiled code in APK will have empty VITE_SUPABASE_URL
      This triggers isMockMode=true → forces local mode
    type: "decision_blocker"
    affects: ["authentication", "production deployment", "debugging strategy"]

  - question: "Is the Capacitor deeplink 'com.tupaquete.dndcompanion://login-callback' registered in Supabase OAuth settings?"
    context: |
      OAuth will fail silently if deeplink is not registered.
      User taps "Sign in with Google", but callback never reaches app.
      Supabase needs this deeplink in:
      Supabase Project → Authentication → Redirect URLs
    type: "decision_blocker"
    affects: ["oauth flow", "mobile authentication", "debugging strategy"]

  - question: "What is the exact version of the APK currently installed on the device?"
    context: |
      Check if it's running latest OTA (v1.1.1) or older version.
      Different versions may have different bugs.
      Use App.tsx localStorage('app_version') to detect.
    type: "decision_blocker"
    affects: ["deployment strategy", "rollback decision"]

  - question: "When the user opens the app, what does OAuthDebugConsole show for 'Supabase Config'?"
    context: |
      OAuthDebugConsole.tsx displays:
      - URL: ✓ Set or ✗ MISSING
      - Key: ✓ Set or ✗ MISSING
      This reveals if env vars loaded correctly in transpiled code.
      Click 🔍 button (bottom-right) to open debug panel.
    type: "research"
    affects: ["diagnosis", "next steps determination"]

  - question: "Is there a .env file in the production environment where the APK was built?"
    context: |
      Build pipeline may not have .env configured.
      CI/CD systems often require env vars via GitHub Secrets, not .env files.
      Without .env, Vite treats VITE_SUPABASE_URL as undefined.
    type: "decision_blocker"
    affects: ["build process", "deployment strategy"]

