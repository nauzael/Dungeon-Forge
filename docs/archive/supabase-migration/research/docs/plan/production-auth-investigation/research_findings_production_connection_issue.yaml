plan_id: "production-auth-investigation"
objective: "Investigate why app in production (APK/iOS) fails to connect to Supabase and remains in local mode"
focus_area: "Production Authentication & Supabase Connection in Capacitor Mobile Build"
created_at: "2026-05-13"
created_by: "RESEARCHER Agent"
status: "completed"

tldr: |
  - App detects isMockMode=true when VITE_SUPABASE_URL is empty/default
  - Variables de entorno se cargan EN BUILD TIME via Vite (no runtime)
  - Si .env no tenía credenciales correctas durante `npm run build`, app transpilado tendrá URLs vacías
  - App luego activa local mode automáticamente por fallback seguro
  - OTA updates contienen código transpilado CON variables de entorno incrustadas
  - Login screen muestra "Local Mode" badge y fuerza local mode
  - NO hay fallback a OAuth si credenciales faltan - es design intencional

research_metadata:
  methodology: "semantic_search + grep_search + detailed file examination"
  scope: "Authentication flow, env var loading, build process, OTA deployment"
  confidence: "high"
  coverage: 95
  decision_blockers: 3
  research_blockers: 0

files_analyzed:
  # Core auth flow
  - file: "components/Login.tsx"
    path: "i:\\Apks\\Dungeon Forge\\components\\Login.tsx"
    purpose: "OAuth login UI and local mode activation"
    key_elements:
      - element: "isMockMode detection"
        type: "variable"
        location: "Login.tsx:14"
        description: |
          Detecta mock mode cuando VITE_SUPABASE_URL está vacío o contiene 'TU_PROYECTO'
          const isMockMode = !import.meta.env.VITE_SUPABASE_URL || 
                            import.meta.env.VITE_SUPABASE_URL.includes('TU_PROYECTO');
        language: "TypeScript"
      - element: "handleGoogleLogin()"
        type: "function"
        location: "Login.tsx:32-90"
        description: |
          Inicia OAuth con Google via Supabase.auth.signInWithOAuth()
          - Detecta plataforma (web vs Capacitor native)
          - Establece redirectUrl según plataforma
          - Si isMockMode=true, muestra alert y retorna
          - Capacitor: abre browser con OAuth URL
        language: "TypeScript"
      - element: "handleLocalModeClick()"
        type: "function"
        location: "Login.tsx:16-30"
        description: |
          Activa local mode manualmente
          - Setea localStorage df_local_mode = 'true'
          - Setea df_session con local developer info
          - Recarga página
        language: "TypeScript"
    lines: 150

  - file: "App.tsx"
    path: "i:\\Apks\\Dungeon Forge\\App.tsx"
    purpose: "Main app component, authentication initialization, Supabase session management"
    key_elements:
      - element: "Local mode check"
        type: "logic"
        location: "App.tsx:62-71"
        description: |
          En useEffect, primer check es localStorage df_local_mode
          if (localModeStr === 'true') {
            setIsLocalMode(true)
            setUser({ name: 'Local Developer', id: devUUID })
            setIsAuthenticated(true)
            return; // Skip Supabase auth
          }
          CRÍTICO: Si local mode está activo, NO intenta conectar a Supabase
        language: "TypeScript"
      - element: "supabase.auth.getSession()"
        type: "function"
        location: "App.tsx:78-90"
        description: |
          Intenta obtener session existente de Supabase
          - Solo ejecuta si df_local_mode !== 'true'
          - Si session existe, setea user y authenticated
          - Si no hay session, user permanece null
        language: "TypeScript"
      - element: "Capacitor deeplink handler"
        type: "listener"
        location: "App.tsx:93-125"
        description: |
          Maneja OAuth callback deeplinks en Capacitor
          - Escucha 'appUrlOpen' event
          - Busca access_token en URL
          - Setea window.location.hash con tokens
          - Espera 2 segundos (CRITICAL FIX) antes de reload
          - Supabase onAuthStateChange debe procesar tokens durante ese tiempo
        language: "TypeScript"
      - element: "OTA update check"
        type: "logic"
        location: "App.tsx:127-165"
        description: |
          Chequea version.json desde Supabase storage bucket
          - Fetch desde ${VITE_SUPABASE_URL}/storage/v1/object/public/updates/version.json
          - Si versión nueva, descarga y notifica
          - Espera confirmación del usuario antes de aplicar
        language: "TypeScript"
    lines: 600+

  - file: "utils/supabase.ts"
    path: "i:\\Apks\\Dungeon Forge\\utils\\supabase.ts"
    purpose: "Supabase client initialization and cloud sync operations"
    key_elements:
      - element: "Environment variable loading"
        type: "variable"
        location: "supabase.ts:20-21"
        description: |
          const supabaseUrl = import.meta.env.VITE_SUPABASE_URL || '';
          const supabaseAnonKey = import.meta.env.VITE_SUPABASE_ANON_KEY || '';
          
          CRÍTICO: import.meta.env es una feature de Vite
          - Se resuelve EN BUILD TIME (transpilación)
          - Los valores se incrustan en el código transpilado
          - NO se reemplazan dinámicamente en runtime
          - Si .env no tenía valores durante build, serán strings vacías
        language: "TypeScript"
      - element: "Supabase initialization logging"
        type: "logging"
        location: "supabase.ts:24-27"
        description: |
          console.log('[Supabase Init] URL:', supabaseUrl ? 'SET ✓' : 'MISSING ✗');
          console.log('[Supabase Init] Key: ', supabaseAnonKey ? 'SET ✓' : 'MISSING ✗');
          
          Estos logs indican al startup si variables están presentes
          Si ves "MISSING ✗" en ambas, credenciales no se cargaron
        language: "TypeScript"
    lines: 80+

  # Build configuration
  - file: "vite.config.ts"
    path: "i:\\Apks\\Dungeon Forge\\vite.config.ts"
    purpose: "Vite build configuration - controls how environment variables are processed"
    key_elements:
      - element: "vite.config.ts content"
        type: "configuration"
        location: "vite.config.ts:1-40"
        description: |
          defineConfig({
            plugins: [react()],
            base: './',
            build: { outDir: 'dist' }
          })
          
          NO incluye configuración especial para variables de entorno
          Vite por defecto:
          - Carga .env file
          - Expone VITE_* prefixed vars via import.meta.env
          - Variables se incrustan en transpilación
          - NO hay reemplazo runtime
        language: "TypeScript"
    lines: 36

  - file: "capacitor.config.json"
    path: "i:\\Apks\\Dungeon Forge\\capacitor.config.json"
    purpose: "Capacitor native app configuration for Android/iOS"
    key_elements:
      - element: "appId"
        type: "configuration"
        location: "capacitor.config.json:2"
        description: "com.tupaquete.dndcompanion - usado para deeplinks OAuth"
        language: "JSON"
      - element: "webDir"
        type: "configuration"
        location: "capacitor.config.json:3"
        description: "'dist' - Capacitor copia archivos de dist/ a app nativa"
        language: "JSON"
      - element: "OAuth deeplink"
        type: "configuration"
        location: "Login.tsx:47"
        description: |
          const redirectUrl = 'com.tupaquete.dndcompanion://login-callback'
          Este deeplink DEBE estar registrado en Supabase OAuth settings
          Si NO está registrado, OAuth fallará silenciosamente
        language: "TypeScript"
    lines: 20

  # Deployment/Build scripts
  - file: ".env.example"
    path: "i:\\Apks\\Dungeon Forge\\.env.example"
    purpose: "Template para variables de entorno"
    key_elements:
      - element: "VITE_SUPABASE_URL"
        type: "variable"
        location: ".env.example:5"
        description: "https://your-project.supabase.co - debe ser seteado en .env real"
        language: "Shell"
      - element: "VITE_SUPABASE_ANON_KEY"
        type: "variable"
        location: ".env.example:6"
        description: "your-anon-key - público (anon) key de Supabase"
        language: "Shell"
    lines: 20

  - file: "scripts/build_ota.mjs"
    path: "i:\\Apks\\Dungeon Forge\\scripts\\build_ota.mjs"
    purpose: "OTA (Over-The-Air) update script - builds and uploads to Supabase"
    key_elements:
      - element: "dotenv.config()"
        type: "function"
        location: "build_ota.mjs:10"
        description: |
          Carga .env PERO SOLO para el script Node
          NO afecta `npm run build` que ya fue ejecutado
          El dist/ ya tiene variables incrustadas de CUANDO se ejecutó build
        language: "JavaScript"
      - element: "Build flow"
        type: "process"
        location: "build_ota.mjs:1-100"
        description: |
          npm run ota = npm run build && node build_ota.mjs
          
          1. npm run build
             - Lee .env
             - Vite transpila con variables incrustadas
             - Genera dist/ con VITE_SUPABASE_URL hardcodeado
          
          2. node build_ota.mjs
             - Lee .env
             - Zipea dist/
             - Sube a Supabase bucket 'updates'
             - Genera version.json con URL del ZIP
          
          IMPORTANTE: Si .env cambió entre steps, OTA contiene código VIEJO
        language: "JavaScript"
    lines: 150

  # Package.json scripts
  - file: "package.json"
    path: "i:\\Apks\\Dungeon Forge\\package.json"
    purpose: "NPM scripts and dependencies"
    key_elements:
      - element: "scripts.build"
        type: "script"
        location: "package.json:7"
        description: '"vite build" - transpila con variables de entorno del momento'
        language: "JSON"
      - element: "scripts.ota"
        type: "script"
        location: "package.json:8"
        description: '"npm run build && node scripts/build_ota.mjs" - full OTA workflow'
        language: "JSON"
    lines: 50

patterns_found:
  - category: "environment variable loading"
    pattern: "Vite build-time substitution"
    description: |
      VITE_* variables se cargan desde .env DURANTE build
      - import.meta.env.VITE_X es transpilado a literal value
      - Si .env no existe o está vacío, value = undefined/empty string
      - NO hay runtime substitution o dynamic loading
      - Cambiar .env DESPUÉS de build no afecta transpilado
    examples:
      - file: "utils/supabase.ts:20-21"
        location: "utils/supabase.ts"
        snippet: "const supabaseUrl = import.meta.env.VITE_SUPABASE_URL || ''"
      - file: "Login.tsx:14"
        location: "Login.tsx"
        snippet: "const isMockMode = !import.meta.env.VITE_SUPABASE_URL"
    prevalence: "common"

  - category: "authentication flow"
    pattern: "Local mode bypass on empty credentials"
    description: |
      Si VITE_SUPABASE_URL está vacío:
      1. Login.tsx: isMockMode detección
      2. User no puede hacer OAuth (botón dice "set VITE_SUPABASE_URL")
      3. User debe clickear logo para Local Mode
      4. localStorage setea df_local_mode = 'true'
      5. App recarga y salta Supabase auth completamente
      6. App funciona offline con localStorage solo
    examples:
      - file: "Login.tsx:14"
        location: "Login.tsx"
        snippet: "const isMockMode = !import.meta.env.VITE_SUPABASE_URL"
      - file: "App.tsx:62-71"
        location: "App.tsx"
        snippet: "if (localModeStr === 'true') { ... return; }"
    prevalence: "common"

  - category: "production build"
    pattern: "OTA embedding + env vars"
    description: |
      OTA update process:
      - `npm run build` embeds env vars
      - `build_ota.mjs` zips dist/ con variables ya incrustadas
      - APK descarga OTA, pero código ya tiene vars
      - Cambiar .env NO afecta APK en producción sin rebuild
    examples:
      - file: "scripts/build_ota.mjs:1-100"
        location: "build_ota.mjs"
        snippet: "npm run build && archiver(dist)"
    prevalence: "occasional"

  - category: "error handling"
    pattern: "Graceful degradation to localStorage"
    description: |
      utils/supabase.ts checks:
      - Si ambas vars están vacías, logs "MISSING ✗"
      - Crea Supabase client con empty strings (fails silently)
      - Operations caen a localStorage fallback
      App no breaks, solo funciona offline
    examples:
      - file: "utils/supabase.ts:24-27"
        location: "utils/supabase.ts"
        snippet: "console.log('[Supabase Init] URL:', supabaseUrl ? 'SET ✓' : 'MISSING ✗')"
    prevalence: "common"

related_architecture:
  components_relevant_to_domain:
    - component: "Login.tsx"
      responsibility: "OAuth UI, isMockMode detection, local mode activation"
      location: "components/Login.tsx"
      relationship_to_domain: |
        Entry point para autenticación
        Detecta si credenciales existen
        Ofrece OAuth o local mode

    - component: "App.tsx (AppContent)"
      responsibility: "Main app initialization, auth state management, OTA updates"
      location: "App.tsx"
      relationship_to_domain: |
        Wraps entire app
        Chequea local mode en startup
        Calls supabase.auth.getSession()
        Maneja OAuth deeplinks desde Capacitor
        Chequea y descarga OTA updates

    - component: "Supabase client"
      responsibility: "Cloud sync operations, authentication"
      location: "utils/supabase.ts"
      relationship_to_domain: |
        Inicializa con variables de entorno
        Logs si vars están presentes
        Crea operaciones cloud (saveCharacter, fetchCharacters, etc.)

  interfaces_used_by_domain:
    - interface: "import.meta.env"
      location: "Vite runtime"
      usage_pattern: |
        import.meta.env.VITE_SUPABASE_URL
        import.meta.env.VITE_SUPABASE_ANON_KEY
        Accedidas en utils/supabase.ts y Login.tsx
        Valores se transpilan EN BUILD TIME

  data_flow_involving_domain: |
    USER OPENS APP (prod APK)
      ↓
    App.tsx useEffect
      ↓
    Check localStorage df_local_mode
      ├─ [YES] → setIsLocalMode=true, skip Supabase
      └─ [NO] → Call supabase.auth.getSession()
           ├─ [Session found] → setIsAuthenticated=true
           └─ [No session] → Stay at Login screen
      ↓
    Login.tsx renders
      ├─ Check isMockMode = !VITE_SUPABASE_URL
      ├─ [YES] → Show "Local Mode" badge, hide OAuth
      └─ [NO] → Show Google OAuth button
      ↓
    User taps Google Login OR Local Mode button
      ├─ [Google] → OAuth flow via Capacitor Browser + deeplinks
      └─ [Local] → setItem df_local_mode='true', reload

  key_relationships_to_domain:
    - from: "Login.tsx"
      to: "App.tsx"
      relationship: "calls onLocalModeActivated, triggers reload"
    - from: "App.tsx"
      to: "utils/supabase.ts"
      relationship: "imports supabase client, calls auth methods"
    - from: "vite.config.ts"
      to: "utils/supabase.ts"
      relationship: "controls how import.meta.env is populated"
    - from: "build_ota.mjs"
      to: "dist/"
      relationship: "zips transpiled code WITH embedded env vars"

