plan_id: 20260522-firebase-oauth-blank-screen
objective: Deep research on Firebase Auth Web SDK behavior inside Capacitor Android for Google OAuth
focus_area: OAuth contract and redirect/popup semantics
created_at: 2026-05-22
created_by: GitHub Copilot (gem-researcher)
status: completed
tldr: |
  - Current app uses a Firebase-backed auth adapter exposed as supabase.auth, but App lifecycle callback logic is still Supabase-token-hash oriented.
  - Firebase redirect contract requires signInWithRedirect -> app return -> getRedirectResult/onAuthStateChanged with Firebase-managed state storage; current deep-link hash injection and forced reload are not part of this contract.
  - Native branch currently uses signInWithPopup inside Capacitor WebView path, while Firebase docs classify popup as browser popup flow and Cordova guidance prefers manual provider flow + signInWithCredential.
  - Android deep-link intent filter exists for com.tupaquete.dndcompanion://login-callback and appUrlOpen listener is active, but callback processing is coupled to access_token/refresh_token hash semantics from prior Supabase flow.
  - Best-fit option by contract compatibility is to use native provider sign-in and exchange credential with Firebase on Android, while keeping web redirect for browser.

