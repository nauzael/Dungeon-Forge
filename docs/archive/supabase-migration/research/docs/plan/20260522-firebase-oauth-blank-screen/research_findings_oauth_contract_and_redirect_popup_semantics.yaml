option_analysis:
  - option: A
    name: Keep Firebase Web SDK and standardize on redirect contract end-to-end
    description: Use signInWithRedirect for all platforms that can return to same web context and consume completion via getRedirectResult/onAuthStateChanged only.
    impacted_files:
      - components/Login.tsx
      - App.tsx
      - utils/firebase.ts
      - Firebase console OAuth/authorized domains configuration
    pros:
      - Minimal conceptual change to existing web Firebase SDK usage
      - Aligns with Firebase documented redirect contract and best-practice docs
    cons:
      - Redirect flow depends on storage continuity and helper-domain behavior that is brittle in embedded/mobile contexts
      - Existing Capacitor custom-scheme callback handling path is currently Supabase-token oriented and must be replaced
    risk: medium_high

  - option: B
    name: Native provider flow on Android plus Firebase signInWithCredential (manual provider sign-in)
    description: Obtain Google credential natively (Custom Tabs/plugin or native Google auth), then exchange credential with Firebase via signInWithCredential in app context.
    impacted_files:
      - components/Login.tsx
      - utils/firebase.ts
      - App.tsx
      - Android native/plugin config files
    pros:
      - Removes dependency on popup/redirect helper-state behavior inside embedded web contexts
      - Closest match to Firebase Cordova guidance for manual OAuth in hybrid environments
      - Session completion occurs directly in app auth context without hash/reload bridge
    cons:
      - Requires additional integration surface (native/provider SDK/plugin)
      - More moving parts in native configuration and token exchange path
    risk: medium

  - option: C
    name: Cordova resolver path for Firebase Web SDK in hybrid container
    description: Initialize auth with explicit hybrid resolver strategy (cordova popup/redirect resolver path) and rework callback handling accordingly.
    impacted_files:
      - utils/firebase.ts
      - components/Login.tsx
      - App.tsx
      - build/dependency setup for resolver entrypoint
    pros:
      - Preserves Firebase Web SDK architecture with fewer cross-stack changes than full native provider integration
      - Targets hybrid resolver semantics explicitly instead of browser defaults
    cons:
      - Capacitor is not identical to Cordova runtime assumptions
      - Firebase docs mark Cordova OAuth area as impacted by Dynamic Links deprecation context
      - Highest uncertainty in long-term compatibility
    risk: high

recommended_option:
  option: B
  rationale: |
    Option B has the highest contract compatibility with observed Android Capacitor behavior because callback/session completion happens in the app context via credential exchange, avoiding reliance on popup/redirect helper storage semantics that are brittle in embedded contexts and are mismatched with current App.tsx hash/reload bridge.
  confidence: 0.88

