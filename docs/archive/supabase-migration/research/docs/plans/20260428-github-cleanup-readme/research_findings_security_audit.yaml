plan_id: "20260428-github-cleanup-readme"
objective: "Auditar el repositorio de Dungeon Forge para seguridad, limpieza y README"
focus_area: "security audit, .gitignore, project description, assets"
created_at: "2026-04-28"
created_by: "gem-researcher"
status: completed

tldr: |
  - CRÍTICO: 3 secretos reales hardcodeados en archivos rastreados por git (SERVICE_KEY, ANON_KEY, TELEGRAM_BOT_TOKEN)
  - Archivos afectados: scripts/run_migration.js, AI_CONTEXT.md, start-telegram-agent.bat
  - .gitignore existe y cubre .env, dist, node_modules, ota-release — pero NO cubre los archivos con secretos
  - README.md actual es el README del CLI de Supabase (no tiene nada que ver con el proyecto)
  - 30+ archivos .txt/.md temporales en la raíz del repo que no deberían estar en GitHub público
  - Assets de imágenes disponibles: avatares por clase, iconos de app, login_bg.png

research_metadata:
  methodology: "grep_search para secretos, file_search para estructura, read_file para contenido"
  scope: "Raíz del repo, scripts/, supabase/, android/, assets/, public/"
  confidence: high
  coverage: 90
  decision_blockers: 1
  research_blockers: 0

# ==============================================================================
# SECCIÓN 1: SECRETOS Y ARCHIVOS SENSIBLES (CRÍTICO)
# ==============================================================================
secrets_found:
  - severity: CRITICAL
    file: "scripts/run_migration.js"
    line: 6-8
    type: "Supabase Service Role Key (JWT) + URL hardcodeados"
    value_preview: "SUPABASE_URL=https://usnlhzkpukkuwbtortil.supabase.co | SERVICE_KEY=eyJhbGci..."
    risk: "El service role key tiene acceso completo a la BD bypaseando RLS. Cualquiera que acceda al repo puede leer/escribir/borrar toda la base de datos."
    action: "ELIMINAR el archivo O reemplazar con process.env. Rotar la key en Supabase Dashboard inmediatamente si el repo es/fue público."

  - severity: CRITICAL
    file: "AI_CONTEXT.md"
    lines: 24-31
    type: "Supabase ANON Key + Service Role Key hardcodeados"
    value_preview: "VITE_SUPABASE_ANON_KEY=eyJ... | SUPABASE_SERVICE_KEY=eyJ..."
    risk: "Contiene AMBAS keys (anon + service role). Diseñado como 'referencia de credenciales reales' para IA — extremadamente peligroso en un repo público."
    action: "ELIMINAR del repo o reemplazar valores con placeholders. Añadir a .gitignore."

  - severity: CRITICAL
    file: "start-telegram-agent.bat"
    lines: 29-31
    type: "Telegram Bot Token + Supabase Service Role Key hardcodeados"
    value_preview: "TELEGRAM_BOT_TOKEN=8682922559:AAFr... | SUPABASE_SERVICE_ROLE_KEY=eyJ..."
    risk: "El Telegram Bot Token permite controlar el bot completamente (enviar mensajes, leer updates). El service role key como bonus."
    action: "ELIMINAR credenciales reales del script. Usar variables de entorno. Rotar el token del bot en @BotFather."

  - severity: LOW
    file: "android/local.properties"
    line: 1
    type: "Ruta local del SDK de Android"
    value_preview: "sdk.dir=C:/Users/Nauzael/AppData/Local/Android/Sdk"
    risk: "Solo revela una ruta de usuario local — no es un secreto, pero tampoco debería estar en git."
    action: "Añadir android/local.properties a .gitignore (ya está cubierto en algunos proyectos Capacitor pero aquí no aparece)."

# ==============================================================================
# SECCIÓN 2: ESTADO ACTUAL DEL .gitignore
# ==============================================================================
gitignore_analysis:
  file_exists: true
  path: "g:\\Apks\\Dungeon Forge\\.gitignore"
  current_coverage:
    - ".env, .env.local, .env.*.local"  # ✅ Variables de entorno
    - "node_modules/"                    # ✅ Dependencias
    - "dist/, build/"                    # ✅ Outputs
    - "ota-release/"                     # ✅ OTA builds
    - "android/build/, android/.gradle/" # ✅ Android builds
    - ".vscode/, .idea/"                 # ✅ IDEs
    - "supabase/.temp/"                  # ✅ Supabase temp

  missing_entries:
    - "android/local.properties"         # ❌ Ruta local del usuario
    - "AI_CONTEXT.md"                    # ❌ Contiene credenciales reales
    - "*.bat (específicamente start-telegram-agent.bat)" # ❌ Contiene tokens
    - "scripts/run_migration.js"         # ❌ Contiene service key
    - "docs/Criticos.docx"               # ❌ Documento con nombre sospechoso
    - "docs/Pifias.docx"                 # ❌ Documento con nombre sospechoso
    - "docs/*.pdf"                       # ❌ PDFs de libros de D&D (posible copyright)
    - ".opencode/"                       # ❌ Herramienta de desarrollo interna
    - "thoughts/"                        # ❌ Notas de desarrollo/diseño internas

