prd_id: PRD-20260522-google-signin-plugin-not-implemented
title: Cierre de incidente Android - GoogleSignIn plugin not implemented
version: 1.0
status: active
created_at: "2026-05-22"
updated_at: "2026-05-22"
owner: mobile-platform
objective: Resolver el incidente "GoogleSignIn plugin is not implemented on android" con fix nativo acotado y validacion por ADB.
incident_context:
  summary: En Android, la invocacion JS al plugin nativo de Google Sign-In falla por registro/exposicion incompleta del plugin.
  baseline_sources:
    - AGENTS.md
    - docs/plan/20260522-google-signin-plugin-not-implemented/research_findings_android_google_signin_plugin.yaml
scope:
  in_scope:
    - Registrar GoogleSignInPlugin en MainActivity durante onCreate.
    - Exponer signInWithGoogle y signOut mediante @PluginMethod.
    - Ejecutar pipeline build/sync/install para validar binario con cambios.
    - Validar runtime login/logout en dispositivo real con evidencia ADB/logcat.
    - Emitir quality gate PASS/FAIL para cierre formal del incidente.
  out_of_scope:
    - Cambios de arquitectura de autenticacion.
    - Migraciones de backend o cambios de proveedor OAuth.
    - Refactors no relacionados al incidente.
requirements:
  - requirement_id: RQ-001
    title: Registro de plugin en bootstrap Android
    description: MainActivity debe registrar GoogleSignInPlugin en onCreate.
    acceptance_criteria:
      - Compilacion Android sin errores de registro/import.
      - El plugin queda disponible para dispatch desde bridge JS.
  - requirement_id: RQ-002
    title: Metodos del plugin expuestos al bridge
    description: GoogleSignInPlugin debe exponer signInWithGoogle y signOut con @PluginMethod.
    acceptance_criteria:
      - Ambos metodos visibles para invocacion JS.
      - No se rompe contrato existente de registerPlugin('GoogleSignIn').
  - requirement_id: RQ-003
    title: Pipeline de build/sync/install verificable
    description: El pipeline npm build + cap sync + gradle debug + adb install debe completar sin errores bloqueantes.
    acceptance_criteria:
      - BUILD SUCCESSFUL en Gradle.
      - APK debug instalado y app lanzable por ADB.
  - requirement_id: RQ-004
    title: Validacion runtime del incidente en dispositivo real
    description: El error "plugin is not implemented" no debe aparecer; login y sign-out deben funcionar en runtime.
    acceptance_criteria:
      - Se abre selector de cuenta de Google.
      - Exchange Firebase exitoso.
      - Sign-out nativo sin crash ni reject.
  - requirement_id: RQ-005
    title: Cierre formal con quality gate
    description: Se debe emitir dictamen PASS/FAIL con evidencia y control de riesgo de logs sensibles.
    acceptance_criteria:
      - Dictamen final documentado con razones.
      - Evidencia reproducible de ADB/logcat.
      - Sin exposicion de secretos/tokens en logs.
traceability:
  requirement_to_tasks:
    - requirement_id: RQ-001
      task_ids: [T1_plugin_registration_and_methods]
    - requirement_id: RQ-002
      task_ids: [T1_plugin_registration_and_methods]
    - requirement_id: RQ-003
      task_ids: [T3_sync_build_install]
    - requirement_id: RQ-004
      task_ids: [T2_adb_validation_matrix, T4_runtime_adb_validation]
    - requirement_id: RQ-005
      task_ids: [T5_quality_gate_review]
