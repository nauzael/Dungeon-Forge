  - question: "What is the actual latency between removeFromParty UPDATE and postgres_changes delivery?"
    context: |
      If UPDATE is instant but postgres_changes delayed >500ms, stale broadcast could arrive first.
      No instrumentation to measure this.
    type: research
    affects: ["race condition likelihood", "retry strategy"]

  - question: "Does Supabase guarantee ordering of postgres_changes events for single table?"
    context: |
      If multiple characters updated in rapid succession, do events preserve order?
      If kicked character's UPDATE comes after another's broadcast, order matters.
    type: research
    affects: ["deduplication strategy", "buffer/queue needed?"]

  - question: "Why is syncTimestamp set to Date.now() when kicking?"
    context: |
      Semantically, syncing CLOCK time doesn't mean the data is newer.
      Could lead to old broadcasts overwriting recent kicks if broadcast has newer timestamp.
    type: decision_blocker
    affects: ["root cause analysis", "fix design"]

  - question: "Is there anywhere in the codebase that unsubscribes from broadcast when player leaves?"
    context: |
