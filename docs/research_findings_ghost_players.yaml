    - broadcastCharacterUpdate: Supabase channel has no auth on broadcast (ephemeral)
    - subscribeToParty: No explicit auth; assumes party_id is public

  authorization_patterns_in_domain: |
    - DM Dashboard: Only creator_id of party can see members (RLS enforced)
    - Player broadcast: No restriction (any player can broadcast to any party)
    - MemberCard kick button: No explicit auth check (RLS enforces at DB level)

  data_validation_in_domain: |
    - Character data: Validated on save via Character type (TypeScript)
    - Broadcast payload: No validation (trusted client data)
    - Deduplication merge: No validation (timestamps compared only)
    - party_id field: Not validated in deduplicateAndMerge

