    - area: removeFromParty visibility
      location: supabase.ts:419-460
      concern: |
        Function accepts characterId only. No auth check that caller is DM.
        RLS policy should prevent non-creator from kicking.
        If RLS fails, falls back to kickLocal (logs locally, doesn't prevent).

    - area: broadcast permissions
      location: supabase.ts:514, App.tsx broadcastCharacterUpdate
      concern: |
        Any player can broadcast any character's data.
        No signature/auth on broadcast payload.
        Could lead to data injection if broadcast not validated.

  authentication_patterns_in_domain: |
