gaps:
  - area: "Deduplication invariant validation"
    description: |
      deduplicateAndMerge() doesn't check if incoming character still belongs to current party.
      Only checks syncTimestamp. Missing semantic validation.
    impact: decision_blocker
    affects: ["ghost player bug", "data integrity"]

  - area: "Broadcast ordering documentation"
    description: |
      No doc on whether postgres_changes and broadcast are ordered relative to each other.
      Assumption: broadcast is "live" and postgres_changes is "persistent", but timing unclear.
    impact: research_blocker
    affects: ["race condition analysis", "fix confidence"]

  - area: "Kicked player client notification"
    description: |
      No evidence that kicked player's app learns they were kicked.
      If they continue broadcasting with old party_id, contributing to ghosts.
    impact: research_blocker
