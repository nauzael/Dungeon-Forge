    impact: decision_blocker
    affects: ["data consistency", "recovery path"]

conclusion: |
  The "ghost players" bug is caused by a combination of:
  
  1. **Race condition**: Broadcast messages with stale character data can arrive during/after 
     the async removeFromParty() operation, before postgres_changes event confirms removal.
  
  2. **Weak deduplication invariant**: deduplicateAndMerge() uses only syncTimestamp for merge decisions,
     ignoring the semantic question: "Does this character belong in this party?"
  
  3. **Mutable flag vulnerability**: isRemoving flag only blocks ONE broadcast message.
     Broadcast queues or retries can bypass this weak protection.
  
  4. **Missing broadcast cleanup**: No evidence that kicked player's broadcast channel is closed.
     Kicked player can keep broadcasting with old party_id if they haven't learned they're out.
  
  The fix should be SURGICAL and DEFENSIVE:
  - Add `if (incoming.party_id !== party.id) return;` BEFORE deduplicateAndMerge in BOTH 
    postgres_changes and broadcast handlers.
  - This is an invariant check, not a flag-based check, so it's reliable regardless of timing.
  - Ensures that semantic correctness (party membership) is validated before timestamp comparison.
  - Complexity: SIMPLE (4 lines of code, no refactoring needed)
  - Risk: LOW (fail-safe: rejects anything not in current party)
  - Side effects: None (just filters, doesn't change merge logic)
