  - id: T6-verify-state-batching
    title: "Verificar y optimizar batching de state updates (6+ rutas)"
    description: |
      **Problema**: DMDashboard tiene 6+ rutas de actualización de estado:
      1. fetchMembers → setMembers
      2. subscribeToParty (postgres_changes) → setMembers
      3. subscribeToParty (broadcast) → setMembers
      4. handlePartySelect → setPartyId + setMembers (2 updates)
      5. handleMemberUpdate → setMembers
      6. handleInitiativeUpdate → setMembers + setInitiativeOrder
      
      **Solución**: Usar React's unstable_batchedUpdates() para agrupar updates → single render cycle.
      
      **Archivos afectados**:
      - components/DMDashboard.tsx: líneas donde setMembers/setPartyId/etc are called
      - hooks/useDMParty.ts: batchedUpdates en fetch response handler
    wave: 2
