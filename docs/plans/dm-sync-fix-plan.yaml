        description: "Member card render loop; identify getArmorClass + getSpellSlotSummary calls"
      - path: "Data/classes"
        description: "May need to import class features for final stats calculation"
    estimated_effort: small
    estimated_files: 3
    estimated_lines: 100
    verification:
      - "React DevTools Profiler shows 0 re-renders on member data change (should be 1)"
      - "Member card AC value correct and updates on equipment change"
      - "Spell slot summary accurate after spell cast"
      - "Performance improvement: <500ms total render time for 6 members"
    acceptance_criteria:
