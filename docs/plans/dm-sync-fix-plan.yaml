  - id: T9-final-verification-and-rollback-plan
    title: "Final verification + rollback strategy"
    description: |
      **Scope**: Verify everything ready for production; document rollback procedure.
      
      **Pre-Deployment Checklist**:
      ✓ All tests passing (Unit + Integration + E2E)
      ✓ No TypeScript errors (strict mode)
      ✓ No console errors in browser
      ✓ Performance metrics within target
      ✓ Security review approved
      ✓ Changelog updated (link to plan_id)
      ✓ Current OTA version tagged (stable point)
      
      **Rollback Strategy**:
      If critical issue found post-deployment:
      
      1. **Quick Rollback (OTA only)** - 1 minute
         ```bash
         node scripts/restore_ota.mjs 1.1.0-2026-05-13-prev "Rollback DM sync fixes"
         ```
         
      2. **Full Rollback (code + OTA)** - 5 minutes
         ```bash
         git checkout v1.1.0  # Last stable tag
         npm install
         npm run build
         npm run ota "Rollback to v1.1.0 stable"
         ```
      
      3. **Disaster Rollback** - If above fails
         ```bash
         git checkout stable-v1.1  # Sealed branch (immutable)
         # Manual deployment from stable branch
         ```
      
      **Monitoring Post-Deployment** (24h window):
      - Monitor console errors in deployed app
      - Check realtime latency metrics (target: <300ms sync)
      - Verify no infinite reconnect loops (CPU usage normal)
      - Check fetchMembers call frequency (should be 1 per 300ms max)
      
      **If issue found**:
      - Log detailed issue (scenario, error stack, timing)
      - Execute Quick Rollback (OTA)
      - Create new plan for fix (v2)
      - Re-test before re-deploy
