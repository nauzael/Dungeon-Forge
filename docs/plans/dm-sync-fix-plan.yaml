      - "Merge preserves latest version of each member"
      - "No undefined/null id crashes"
      - "Performance: dedup call < 10ms even with 100+ members"
    acceptance_criteria:
      - "createMemberMap() function implemented (O(1) lookups)"
      - "deduplicateAndMerge() refactored to use Map internally"
