tasks:
  # ===== WAVE 1: Critical Fixes (parallelizable) =====
  
  - id: T1-debounce-fetchMembers
    title: "Agregar debounce 300ms a fetchMembers"
    description: |
      **Problema**: fetchMembers se llama sin debounce en select party, create party, manual refresh, 
      InitiativeTracker sync → genera queries SQL redundantes cada vez.
      
      **Solución**: Implementar debounce 300ms (como saveData en App.tsx) + AbortController 
      para invalidar requests obsoletas si usuario cambia party ID rápidamente.
      
      **Archivos afectados**:
      - DMDashboard.tsx: línea 170 fetchMembers()
      - utils/supabase.ts: exportar fetchMembers con debounce
      
      **Patrón**: 
      ```typescript
      const debouncedFetch = useCallback(
        debounce((id: string) => {
          abortController.abort();
          abortController = new AbortController();
          return fetchMembers(id, { signal: abortController.signal });
        }, 300),
        []
      );
      ```
    wave: 1
    agent: gem-implementer
    prototype: false
    covers: ["fetchMembers", "debounce", "race condition prevention"]
    priority: high
    status: pending
    dependencies: []
    conflicts_with: []
    context_files:
      - path: "components/DMDashboard.tsx"
        description: "Lines 170, call to fetchMembers in handlePartySelect"
      - path: "utils/supabase.ts"
        description: "fetchMembers function definition + realtime subscriptions"
      - path: "hooks"
        description: "Create useDebounce hook if not exists"
    estimated_effort: small
    estimated_files: 3
    estimated_lines: 120
    verification:
      - "fetchMembers no se llama más de 1 vez en 300ms durante rapid party selection"
      - "InitiativeTracker.tsx seguirá funcionando (verifica que sync still triggers)"
      - "Network tab muestra 1 query en lugar de 3-5 en quick succession"
      - "Verificar AbortController cancela requests anteriores"
    acceptance_criteria:
      - "Debounce implementado y funcional (console logs show delay)"
      - "AbortController cancela requests if party ID changes"
      - "No visual glitches (loading state still correct)"
      - "Latency < 400ms total (300ms debounce + 50-100ms query)"
    failure_modes:
      - scenario: "Race condition: User selects party A, then B, then A → version mismatch"
        likelihood: medium
        impact: high
        mitigation: "Include UUID/version in AbortController; verify response ID matches current"
      - scenario: "Debounce delay feels sluggish for 'manual refresh' button"
        likelihood: low
        impact: low
        mitigation: "Add `immediate: true` for non-debounced refresh path"

  - id: T2-usememo-member-renders
    title: "Memoizar cálculos costosos en member card renders"
    description: |
      **Problema**: Cada render de member card recalcula:
      - getArmorClass(member, getFinalStats(member)) 
      - getSpellSlotSummary(member.spells)
      - 4-6 miembros = 8-12 funciones O(n) por render
      
      **Solución**: Crear `useMemberStats` hook que memoiza estos cálculos.
      Parámetro de dependencia: [member.id, member.class, member.level, member.stats, member.equipment]
      
      **Archivos afectados**:
      - components/DMDashboard.tsx: líneas 514, 527 (member card render loop)
      - hooks/useMemberStats.ts: NEW
      - types.ts: extend MemberStats interface si necessary
    wave: 1
    agent: gem-implementer
    prototype: false
    covers: ["useMemo", "performance", "render optimization"]
    priority: high
    status: pending
    dependencies: []
    conflicts_with: []
    context_files:
