  - id: T4-realtime-timeout
    title: "Agregar timeout + reconnect logic en realtime channel"
    description: |
      **Problema**: channel.subscribe() falla silenciosamente. realtimeStatus nunca cambia a 'error'.
      No retry logic → user queda con datos stale sin saberlo.
      
      **Solución**: Implementar subscribeWithRetry() con:
      - Timeout 5s para detectar disconnect
      - Exponential backoff 500ms → 8s max para reconnect
      - Error callback para actualizar UI (realtimeStatus = 'error' | 'connected' | 'reconnecting')
      
      **Archivos afectados**:
      - utils/supabase.ts: línea 217 (subscribeToParty)
      - utils/realtimeRetry.ts: NEW (extracted utility)
      - DMDashboard.tsx: consume realtimeStatus state
    wave: 1
    agent: gem-implementer
    prototype: false
    covers: ["realtime", "error handling", "retry logic", "network resilience"]
    priority: medium
    status: pending
    dependencies: []
    conflicts_with: []
    context_files:
      - path: "utils/supabase.ts"
        description: "subscribeToParty function; lines 217+"
      - path: "components/DMDashboard.tsx"
        description: "realtimeStatus state + UI indicator"
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 150
    verification:
      - "Disconnect network → realtimeStatus changes to 'error' within 5s"
      - "Reconnect → realtimeStatus changes to 'connecting' then 'connected' within backoff window"
      - "No infinite reconnect loops (exponential backoff works)"
      - "UI shows error state to user (visual feedback)"
      - "Console shows retry attempts + backoff delays"
    acceptance_criteria:
      - "subscribeWithRetry() implemented with timeout + exponential backoff"
      - "realtimeStatus: 'connected' | 'error' | 'reconnecting' | 'disconnected'"
      - "Error state persists max 8s before retry"
      - "Max 5 retries per reconnect cycle (then user notified to refresh)"
    failure_modes:
