        mitigation: "Monitor with React Profiler; remove if no benefit"

  - id: T3-dedup-optimization
    title: "Optimizar deduplicación O(n) → O(1) con Map"
    description: |
      **Problema**: deduplicateAndMerge() + removeDuplicates() buscan array entero en CADA update.
      Llamado en: postgres_changes (INSERT/UPDATE), broadcast, fetchMembers.
      Con 100+ chars = acumulable latency.
      
      **Solución**: Reemplazar array.filter() con Map<id, member> para O(1) lookups.
      
      **Archivos afectados**:
      - utils/supabase.ts: líneas 40-80 (deduplicateAndMerge, removeDuplicates)
      - May refactor into utils/memberDedup.ts
    wave: 1
    agent: gem-implementer
    prototype: false
    covers: ["deduplication", "algorithmic optimization", "performance"]
    priority: medium
