---

## Summary for User

**Estado:** Investigation Complete  
**Confianza:** HIGH (85% coverage)

### Hallazgos Clave

1. **DMDashboard.tsx es un "god component"** (~687 líneas)
   - Violaría reglas de arquitectura (max 500 líneas)
   - Múltiples responsabilidades sin separación

2. **Flujo de sincronización identificado**
   - `fetchMembers()` → Query SQL sin throttle
   - `subscribeToParty()` → postgres_changes + broadcast listeners
   - `setMembers()` llamado 6+ veces sin batching

3. **4 Candidatos para problemas de demora**
   - ❌ **fetchMembers sin debounce** → Query completa cada vez
   - ❌ **Sin useMemo en renders** → recalcula AC/stats innecesariamente
   - ❌ **Deduplicación O(n)** → costosa con muchos chars
   - ❌ **Sin timeout/reconnect** → channel.subscribe() silencioso

4. **Arquitectura actual**
   ```
   DMDashboard → subscribeToParty (DB truth)
                → broadcast listener (ephemeral)
                → fetchMembers (manual sync)
                → 5 lazy-loaded sub-components
   ```

### Decisiones Necesarias

| Pregunta | Impacto | Bloqueante |
|----------|--------|-----------|
| ¿Qué es "demora" en segundos reales? | Valida problema | ✅ SÍ |
| ¿Cuántos personajes típicamente? | Escala de optimization | ✅ SÍ |
| ¿Errores Supabase o lentitud pura? | Debugging strategy | ✅ SÍ |
| ¿Múltiples DMs concurrentes? | Concurrency testing | ❌ NO |

### Próximos Pasos Recomendados

1. **Fase 1: Diagnosticar**
   - Recolectar logs (DevTools Network, console)
   - Medir tiempos de fetchMembers vs setMembers vs render
   - Verificar estado del canal realtime

2. **Fase 2: Optimizar** (MEDIUM complexity)
   - Agregar debounce a fetchMembers (300ms)
   - Implementar useMemo para derivados (AC, stats)
   - Refactorizar deduplication (usar Map más eficiente)
   - Agregar timeout handling en subscribeToParty

3. **Fase 3: Refactor** (después de Phase 2)
   - Dividir DMDashboard en sub-componentes
   - Extraer party management a custom hook
   - Implementar proper error boundaries

