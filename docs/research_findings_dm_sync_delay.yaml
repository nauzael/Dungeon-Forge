plan_id: dm-sync-investigation-2026-05-13
objective: Investigar y documentar problemas de demora en la sincronización de datos del panel DM
focus_area: DMDashboard.tsx - Supabase realtime channels - party member synchronization
created_at: '2026-05-13T00:00:00Z'
created_by: gem-researcher-agent
status: completed

tldr: |
  - **Componentes afectados:** DMDashboard.tsx (680+ líneas), subscribeToParty(), fetchMembers()
  - **Patrón de demora:** Múltiples setMembers() calls sin batching + deduplicateAndMerge() O(n) en cada update
  - **Sincronización:**
    * postgres_changes (DB truth) vía Supabase realtime
    * broadcast (ephemeral live updates) con deduplication
    * Ambos canales convergen en setMembers() 
  - **Gaps identificados:**
    * No debounce en fetchMembers()
    * Sin throttling en broadcast updates
    * Falta useMemo para derived stats (getArmorClass, getFinalStats)
    * No reconexión automática si channel cae
    * 15s timeout hardcoded sin feedback visual
  - **Complejidad recomendada:** MEDIUM

