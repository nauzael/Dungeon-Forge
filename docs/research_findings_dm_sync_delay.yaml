domain_security_considerations:
  sensitive_areas:
    - area: party_id filter in subscribeToParty
      location: utils/supabase.ts line 227
      concern: |
        Filter: party_id=eq.${partyId}
        Relies on Supabase RLS to enforce visibility
        If RLS misconfigured, users could see other party's characters

    - area: broadcast character updates
      location: App.tsx lines 547, 562
      concern: |
        broadcastCharacterUpdate sends full Character object
        If party_id changes, stale broadcast might sync wrong character
        Mitigation: validar party_id en DMDashboard broadcast handler (existe)

  authentication_patterns_in_domain: |
    - user.id from supabase.auth.getSession()
    - Used in fetchAllParties() as creator_id filter
    - Assumed to be present before DM Dashboard opens

  authorization_patterns_in_domain: |
    - RLS on 'characters' table: party_id filter
    - RLS on 'parties' table: creator_id match
    - DMDashboard assumes: user owns the party (creator_id check in DB)

  data_validation_in_domain: |
    ✅ party_id validation en broadcast (line 228)
    ✅ isRemoving flag prevents race condition on kick (line 224)
    ✅ syncTimestamp for conflict resolution
    ❌ No network-level validation (could receive corrupted data)

