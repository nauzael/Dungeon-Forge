      location: types.ts
      usage_pattern: "Initiative tracker state, localStorage persistence"

    - interface: DMDashboardProps
      location: DMDashboard.tsx
      usage_pattern: "Props para onBack, onViewCharacter, user"

  data_flow_involving_domain: |
    1. DM selecciona party → fetchMembers(partyId)
       → Supabase.from('characters').select('data').eq('party_id', partyId)
       → setMembers(deduplicated)
       → Render members list

    2. Jugador actualiza personaje en otra sesión
       → Character saved a DB vía saveCharacterToCloud() [App.tsx]
       → broadcastCharacterUpdate(party_id, character) [App.tsx]
       → subscribeToParty broadcast listener dispara [DMDashboard]
       → setMembers(prev => deduplicateAndMerge(...))
       → Render updates

    3. Realtime postgres_changes escucha table:characters
       → UPDATE/INSERT trigger
       → DMDashboard postgres_changes handler
       → setMembers(prev => deduplicateAndMerge(...))
       → Render updates

  key_relationships_to_domain:
    - from: DMDashboard.fetchMembers()
      to: supabase.from('characters')
      relationship: Query sin throttle/debounce

    - from: DMDashboard.subscribeToParty()
      to: supabase.channel()
      relationship: Realtime subscription, multiple update vectors

    - from: App.broadcastCharacterUpdate()
      to: DMDashboard broadcast listener
      relationship: Ephemeral updates, no DB persist

    - from: DMDashboard members.map()
      to: getArmorClass/getFinalStats
      relationship: No memoized, recalc on every render

