patterns_found:
  - category: structure
    pattern: DMDashboard tiene múltiples responsabilidades
    description: |
      Componente "god component" (~687 líneas):
      - Party selection/management
      - Real-time member synchronization
      - Tab switching (party, resources, compendium, monsters, initiative, critical)
      - Lazy-loading 5 sub-components
      - Initiative tracker localStorage sync
      Violaría regla: componentes >500 líneas deben dividirse
    examples:
      - file: DMDashboard.tsx
        location: "lines 1-687"
        snippet: Todas las responsabilidades en un solo archivo
    prevalence: common

  - category: performance
    pattern: Sin debounce en fetchMembers()
    description: |
      fetchMembers() se llama sin throttle:
      - Al seleccionar party (línea 439)
      - Al crear party (línea 262)
      - Al refrescar manual (línea 396)
      - Desde InitiativeTracker sync (línea 573)
      Cada call = Query SQL completa SIN CACHE
      Contrasta con saveData que SÍ tiene debounce 300ms (App.tsx:343)
    examples:
      - file: DMDashboard.tsx
        location: "lines 170-187"
        snippet: |
          const fetchMembers = async (partyId: string) => {
            setIsLoading(true);
            const { data } = await supabase
              .from('characters')
              .select('data')
              .eq('party_id', partyId);
            // NO debounce, NO cache
            setMembers(deduplicated);
          };
    prevalence: common

  - category: error_handling
    pattern: setRealtimeStatus sin timeout handling
    description: |
      realtimeStatus se pone en "connected" SIN verificar:
      - ¿Canales realmente conectados?
      - ¿Timeout de reconnexión?
      - ¿Error en subscribe()?
      Siempre muestra "Live" aunque channel falle silenciosamente
    examples:
      - file: DMDashboard.tsx
        location: "lines 251-252"
        snippet: |
          setRealtimeStatus('connected');
          return () => { channel.unsubscribe(); };
      - file: DMDashboard.tsx
        location: "lines 386-390"
        snippet: |
          <div className={realtimeStatus === 'connected' 
            ? 'bg-emerald-500/10...' 
            : 'bg-amber-500/10 animate-pulse'}>
    prevalence: common

  - category: state_management
    pattern: setMembers llamado sin batching (6+ veces)
    description: |
      Múltiples rutas causan setMembers, sin consolidación:
      1. fetchMembers() → setMembers(deduplicated)  [línea 182]
      2. postgres_changes INSERT/UPDATE → deduplicateAndMerge + setMembers  [línea 206]
      3. postgres_changes DELETE → filter + setMembers  [línea 216]
      4. broadcast character-update → deduplicateAndMerge + setMembers  [línea 236]
      5. handleKickCharacter → filter + setMembers  [línea 290]
      Cada update = re-render completo + re-calcs de AC/stats en miembros
      Sin useMemo, getArmorClass/getFinalStats se llaman en render (innecesario)
    examples:
      - file: DMDashboard.tsx
        location: "lines 182, 201, 206, 216, 236, 290"
        snippet: |
          // Route 1: fetchMembers
          setMembers(deduplicated);
          
          // Route 2: postgres_changes
          setMembers(prev => deduplicateAndMerge(prev, updatedChar));
          
          // Route 3: broadcast
          setMembers(prev => deduplicateAndMerge(prev, char));
          
          // Route 4: handleKickCharacter
          setMembers(prev => prev.filter(c => c.id !== id));
    prevalence: common

  - category: performance
    pattern: Falta useMemo para derived stats en render
    description: |
      DMDashboard render loop (members.map):
      - getArmorClass(member, getFinalStats(member)) → línea 514
      - getSpellSlotSummary(member) → línea 527
      - Object.entries(getSpellSlotSummary) → línea 527
      Se recalculan en CADA render, sin memoization
      Especialmente costoso con 4-6 personajes + frequent updates
    examples:
      - file: DMDashboard.tsx
        location: "lines 514, 527"
        snippet: |
          <span className="text-xl font-black text-white">
            {getArmorClass(member, getFinalStats(member))}
          </span>
          {Object.entries(getSpellSlotSummary(member)).map(([lvl, info]) => ...)}
    prevalence: common

  - category: architecture
    pattern: Deduplication logic O(n) en cada update
    description: |
      deduplicateAndMerge y removeDuplicates son O(n):
      - Busca en array: findIndex (O(n))
      - Crea Map y recorre: O(n)
      - Lllamado en CADA postgres_changes + broadcast update
      Con 100+ caracteres, esto se acumula rápidamente
    examples:
      - file: DMDashboard.tsx
        location: "lines 40-80"
        snippet: |
          const deduplicateAndMerge = (current, incoming) => {
            const existingIndex = current.findIndex(c => c.id === incoming.id);
            // ...
          };
          const removeDuplicates = (chars) => {
            const map = new Map();
            for (const char of chars) {  // O(n)
              // ...
            }
            return Array.from(map.values());
          };
    prevalence: occasional

  - category: error_handling
    pattern: subscribeToParty sin error handling explícito
    description: |
      channel.subscribe() puede fallar:
      - Network issues
      - Missing RLS permissions
      - Supabase outage
      Sin try/catch, error pasa silenciosamente
      realtimeStatus nunca cambia a 'error'
    examples:
      - file: utils/supabase.ts
        location: "lines 217-244"
        snippet: |
          export const subscribeToParty = (...) => {
            const channel = supabase.channel(`party-${partyId}`);
            channel.on('postgres_changes', {...}, onUpdate);
            if (onBroadcast) { channel.on('broadcast', {...}, ...); }
            return channel.subscribe();  // Sin error handling
          };
    prevalence: occasional

